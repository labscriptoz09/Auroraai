<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:2rem;text-align:center}
h1{color:#d4af37}
.result{background:rgba(212,175,55,0.1);border:1px solid #d4af37;padding:1rem;margin:1rem auto;max-width:500px;border-radius:10px}
.ok{color:#4ade80}
.err{color:#ff4d4d}
</style>
</head>
<body>
<h1>🧪 Test Supabase</h1>
<div id="result" class="result">⏳ Chargement...</div>
<div id="videos"></div>

<script>
async function testSupabase(){
  const resultDiv=document.getElementById('result');
  const videosDiv=document.getElementById('videos');
  
  try{
    // Vérifier si Supabase est chargé
    if(typeof supabase==='undefined'){
      resultDiv.innerHTML='<span class="err">❌ Supabase SDK non chargé</span>';
      return;
    }
    
    resultDiv.innerHTML='<span class="ok">✅ Supabase SDK chargé</span>';
    
    // Créer le client
    const client=supabase.createClient(
      'https://knecqgspkalwepdwwpud.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuZWNxZ3Nwa2Fsd2VwZHd3cHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODUyNjUsImV4cCI6MjA5Njk2MTI2NX0.giDQFM5k2wQBlXAD10XKF8BRcg_jmABkjvQQ8ai7pww'
    );
    
    resultDiv.innerHTML+='<br><span class="ok">✅ Client créé</span>';
    
    // Tester la connexion
    const {data,error}=await client.from('videos').select('*').limit(5);
    
    if(error){
      resultDiv.innerHTML+='<br><span class="err">❌ Erreur: '+error.message+'</span>';
    }else{
      resultDiv.innerHTML+='<br><span class="ok">✅ Connexion réussie!</span>';
      resultDiv.innerHTML+='<br><span class="ok">📊 '+data.length+' vidéo(s) trouvée(s)</span>';
      
      if(data.length>0){
        videosDiv.innerHTML='<h2 style="color:#d4af37">Vidéos dans la base:</h2>';
        data.forEach(v=>{
          videosDiv.innerHTML+='<div class="result"><strong>'+v.title+'</strong><br>'+v.author+'</div>';
        });
      }
    }
  }catch(e){
    resultDiv.innerHTML='<span class="err">❌ Erreur: '+e.message+'</span>';
  }
}

testSupabase();
</script>
</body>
</html>
