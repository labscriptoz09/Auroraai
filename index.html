<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuroraAI.watch</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #030305; 
            color: white; 
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }
        
        #canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 0;
        }
        
        .glow { 
            position: fixed; 
            width: 100vw; 
            height: 100vw; 
            border-radius: 50%; 
            filter: blur(100px); 
            opacity: 0.4; 
            z-index: 0;
            animation: breathe 15s infinite; 
        }
        .glow-1 { 
            background: radial-gradient(circle, #f97316 0%, transparent 70%); 
            top: -30%; 
            left: -30%; 
        }
        .glow-2 { 
            background: radial-gradient(circle, #7c3aed 0%, transparent 70%); 
            bottom: -30%; 
            right: -30%; 
            animation-delay: -5s; 
        }
        @keyframes breathe {             0%, 100% { transform: scale(1); opacity: 0.3; } 
            50% { transform: scale(1.2); opacity: 0.5; } 
        }

        header { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            z-index: 100; 
            padding: 1rem; 
            background: rgba(3,3,5,0.8); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        .header-container { 
            max-width: 1400px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { 
            font-size: 1.3rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #fff, #f97316); 
            -webkit-background-clip: text; 
            color: transparent; 
        }
        .menu-btn { 
            width: 44px; 
            height: 44px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            color: white; 
            font-size: 1.2rem; 
            cursor: pointer; 
            position: relative;
        }
        
        /* NOUVEAU : Badge compteur favoris */
        .fav-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #f97316;
            color: white;
            font-size: 0.7rem;
            font-weight: 700;            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .fav-badge.visible {
            display: flex;
        }

        .mobile-menu { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            background: rgba(3,3,5,0.98); 
            backdrop-filter: blur(30px); 
            z-index: 200; 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 2rem; 
        }
        .mobile-menu.active { 
            display: flex; 
        }
        .mobile-menu a { 
            color: white; 
            text-decoration: none; 
            font-size: 1.5rem; 
            font-weight: 700; 
        }
        .close-btn { 
            position: absolute; 
            top: 1rem; 
            right: 1rem; 
            width: 44px; 
            height: 44px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; 
            color: white; 
            font-size: 1.3rem; 
            cursor: pointer; 
        }

        .hero {             min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            padding: 6rem 1rem 3rem; 
            position: relative;
            z-index: 1;
        }
        .hero h1 { 
            font-size: clamp(2rem, 8vw, 3.5rem); 
            font-weight: 800; 
            margin-bottom: 1rem; 
        }
        .hero h1 span { 
            color: #f97316; 
        }
        .hero p { 
            font-size: 1rem; 
            color: #94a3b8; 
            max-width: 500px; 
            margin-bottom: 2rem; 
        }
        .btn { 
            padding: 1rem 2rem; 
            border: none; 
            border-radius: 50px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            max-width: 300px; 
            margin: 0.5rem; 
            font-family: inherit; 
        }
        .btn-primary { 
            background: linear-gradient(135deg, #f97316, #ff8c00); 
            color: white; 
        }
        .btn-secondary { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
        }

        .search-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1rem 1rem;
            position: relative;            z-index: 1;
        }
        .search-box {
            position: relative;
            width: 100%;
        }
        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 3rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }
        .search-box input:focus {
            outline: none;
            border-color: #f97316;
        }
        .search-box i {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .filters {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding: 0 1rem 1rem;
            max-width: 1400px;
            margin: 0 auto;
            scrollbar-width: none;
            z-index: 1;
            position: relative;
        }
        .filters::-webkit-scrollbar {
            display: none;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            color: #94a3b8;
            white-space: nowrap;
            cursor: pointer;            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .filter-btn:hover {
            background: rgba(249,115,22,0.1);
        }
        .filter-btn.active {
            background: #f97316;
            color: white;
            border-color: #f97316;
        }

        .content { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 1rem; 
            position: relative;
            z-index: 1;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .section-title { 
            font-size: 1.5rem; 
            font-weight: 700; 
        }
        .video-count {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .video-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 1rem; 
        }
        .video-card { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 16px; 
            overflow: hidden; 
            cursor: pointer;
            transition: transform 0.2s ease;
            position: relative;
        }
        .video-card:hover {
            transform: translateY(-2px);        }
        .thumbnail { 
            position: relative; 
            aspect-ratio: 16/9; 
            background: linear-gradient(135deg, #1a1a2e, #0a0a0f); 
        }
        .thumbnail img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }
        .play-icon { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 50px; 
            height: 50px; 
            background: rgba(249,115,22,0.9); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
        }
        
        /* NOUVEAU : Bouton favori */
        .fav-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            width: 36px;
            height: 36px;
            background: rgba(3,3,5,0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s ease;
        }
        .fav-btn:hover {
            transform: scale(1.1);
        }
        .fav-btn.active {            color: #f97316;
            background: rgba(249,115,22,0.2);
            border-color: #f97316;
        }

        .card-info { 
            padding: 1rem; 
        }
        .card-title { 
            font-weight: 700; 
            margin-bottom: 0.5rem; 
        }
        .card-meta { 
            display: flex; 
            justify-content: space-between; 
            font-size: 0.85rem; 
            color: #94a3b8; 
            margin-bottom: 0.8rem; 
        }
        .card-actions { 
            display: flex; 
            gap: 0.5rem; 
        }
        .action-btn { 
            flex: 1; 
            padding: 0.5rem; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; 
            color: white; 
            font-size: 0.85rem; 
            cursor: pointer; 
            font-family: inherit; 
        }
        .action-btn.tip { 
            background: rgba(249,115,22,0.1); 
            border-color: rgba(249,115,22,0.3); 
            color: #f97316; 
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }        .modal.active {
            display: flex;
        }
        .modal-content {
            background: rgba(20,20,30,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 1.5rem;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal video {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 1rem;
            background: #000;
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .modal-author {
            color: #f97316;
            margin-bottom: 1rem;
        }
        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
        }        .modal-btn {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .modal-btn.primary {
            background: linear-gradient(135deg, #f97316, #ff8c00);
            border: none;
        }

        /* NOUVEAU : Toast notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20,20,30,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 3px solid #f97316;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 500;
            backdrop-filter: blur(20px);
            transition: transform 0.3s ease;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (min-width: 768px) { 
            .video-grid { grid-template-columns: repeat(2, 1fr); } 
        }
        @media (min-width: 1024px) { 
            .video-grid { grid-template-columns: repeat(3, 1fr); } 
        }
    </style></head>
<body>
<canvas id="canvas"></canvas>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>

<header>
    <div class="header-container">
        <div class="logo"><i class="fas fa-bolt" style="color: #f97316;"></i> AURORAAI</div>
        <button class="menu-btn" onclick="toggleMenu()">
            <i class="fas fa-bars"></i>
            <span class="fav-badge" id="favBadge">0</span>
        </button>
    </div>
</header>

<div class="mobile-menu" id="mobileMenu">
    <button class="close-btn" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
    <a href="#hero" onclick="toggleMenu()">Accueil</a>
    <a href="#content" onclick="toggleMenu(); showAllVideos()">Explorer</a>
    <a href="#content" onclick="toggleMenu(); showFavorites()">❤️ Mes Favoris</a>
    <a href="#" onclick="toggleMenu()">Upload Vidéo</a>
</div>

<section class="hero" id="hero">
    <h1>L'IA <span>réinvente</span> le cinéma</h1>
    <p>Films et séries créés par IA. Regardez, téléchargez gratuitement.</p>
    <div>
        <button class="btn btn-primary" onclick="document.getElementById('content').scrollIntoView({behavior:'smooth'})"><i class="fas fa-download"></i> Télécharger</button>
        <button class="btn btn-secondary"><i class="fas fa-upload"></i> Partager vidéo AI</button>
    </div>
</section>

<div class="search-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Rechercher une vidéo, un créateur...">
    </div>
</div>

<div class="filters">
    <button class="filter-btn active" onclick="filterVideos('all', this)">Tous</button>
    <button class="filter-btn" onclick="filterVideos('Sci-Fi', this)">Sci-Fi</button>
    <button class="filter-btn" onclick="filterVideos('Onirique', this)">Onirique</button>
    <button class="filter-btn" onclick="filterVideos('Thriller', this)">Thriller</button>
    <button class="filter-btn" onclick="filterVideos('Romance', this)">Romance</button>
</div>

<section class="content" id="content">
    <div class="section-header">        <h2 class="section-title" id="sectionTitle">🔥 Tendances</h2>
        <span class="video-count" id="videoCount">4 vidéos</span>
    </div>
    <div class="video-grid" id="videoGrid"></div>
</section>

<div class="modal" id="videoModal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        <video id="modalVideo" controls></video>
        <h3 class="modal-title" id="modalTitle"></h3>
        <p class="modal-author" id="modalAuthor"></p>
        <div class="modal-actions">
            <button class="modal-btn primary" onclick="downloadVideo()">
                <i class="fas fa-download"></i> Télécharger gratuitement
            </button>
            <button class="modal-btn" onclick="shareVideo()">
                <i class="fas fa-share"></i> Partager
            </button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// DONNÉES VIDÉOS
const videos = [
    { id: 1, title: "Nexus Prime", author: "Cyber Alice", views: "124k", category: "Sci-Fi", img: "https://picsum.photos/seed/nexus/400/225", video_url: "https://www.w3schools.com/html/mov_bbb.mp4" },
    { id: 2, title: "Rêves de Silicium", author: "Dream Weaver", views: "89k", category: "Onirique", img: "https://picsum.photos/seed/reves/400/225", video_url: "https://www.w3schools.com/html/mov_bbb.mp4" },
    { id: 3, title: "Data Storm", author: "Chaos Core", views: "210k", category: "Thriller", img: "https://picsum.photos/seed/data/400/225", video_url: "https://www.w3schools.com/html/mov_bbb.mp4" },
    { id: 4, title: "Neon Memories", author: "Future Citizen", views: "56k", category: "Romance", img: "https://picsum.photos/seed/neon/400/225", video_url: "https://www.w3schools.com/html/mov_bbb.mp4" }
];

let currentVideo = null;
let currentFilter = 'all';

// NOUVEAU : Favoris (stockés dans le navigateur)
let favorites = JSON.parse(localStorage.getItem('aurora_favorites') || '[]');

// AFFICHER LES VIDÉOS
function displayVideos(videosToDisplay) {
    const grid = document.getElementById('videoGrid');
    const count = document.getElementById('videoCount');
    
    if (videosToDisplay.length === 0) {
        grid.innerHTML = '<p style="text-align:center; color:#94a3b8; grid-column:1/-1; padding:2rem;">Aucune vidéo trouvée.</p>';
        count.textContent = '0 vidéo';
        return;
    }    
    count.textContent = videosToDisplay.length + ' vidéo' + (videosToDisplay.length > 1 ? 's' : '');
    
    grid.innerHTML = videosToDisplay.map(v => {
        const isFav = favorites.includes(v.id);
        return `
        <div class="video-card" onclick="openVideo(${v.id})">
            <div class="thumbnail">
                <img src="${v.img}" alt="${v.title}">
                <div class="play-icon"><i class="fas fa-play"></i></div>
                <button class="fav-btn ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite(${v.id})">
                    <i class="fas fa-heart"></i>
                </button>
            </div>
            <div class="card-info">
                <div class="card-title">${v.title}</div>
                <div class="card-meta">
                    <span><i class="fas fa-user"></i> ${v.author}</span>
                    <span><i class="fas fa-eye"></i> ${v.views}</span>
                </div>
                <div class="card-actions">
                    <button class="action-btn" onclick="event.stopPropagation(); downloadById('${v.video_url}', '${v.title}')">
                        <i class="fas fa-download"></i> Télécharger
                    </button>
                    <button class="action-btn tip" onclick="event.stopPropagation(); showToast('Tip envoyé à ${v.author} ! 💝')">
                        <i class="fas fa-heart"></i> Tip
                    </button>
                </div>
            </div>
        </div>
        `;
    }).join('');
}

// NOUVEAU : Gérer les favoris
function toggleFavorite(videoId) {
    const index = favorites.indexOf(videoId);
    if (index > -1) {
        favorites.splice(index, 1);
        showToast('Retiré des favoris');
    } else {
        favorites.push(videoId);
        showToast('❤️ Ajouté aux favoris');
    }
    localStorage.setItem('aurora_favorites', JSON.stringify(favorites));
    updateFavBadge();
    
    // Rafraîchir l'affichage selon le filtre actuel
    if (currentFilter === 'all') {
        displayVideos(videos);    } else {
        const filtered = videos.filter(v => v.category === currentFilter);
        displayVideos(filtered);
    }
}

function updateFavBadge() {
    const badge = document.getElementById('favBadge');
    if (favorites.length > 0) {
        badge.textContent = favorites.length;
        badge.classList.add('visible');
    } else {
        badge.classList.remove('visible');
    }
}

function showFavorites() {
    const favVideos = videos.filter(v => favorites.includes(v.id));
    document.getElementById('sectionTitle').textContent = '❤️ Mes Favoris';
    document.getElementById('content').scrollIntoView({behavior:'smooth'});
    displayVideos(favVideos);
}

function showAllVideos() {
    currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn').classList.add('active');
    document.getElementById('sectionTitle').textContent = '🔥 Tendances';
    displayVideos(videos);
}

// FILTRER PAR CATÉGORIE
function filterVideos(category, btn) {
    currentFilter = category;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    
    let filtered = videos;
    if (category !== 'all') {
        filtered = videos.filter(v => v.category === category);
    }
    
    const title = category === 'all' ? '🔥 Tendances' : '🎬 ' + category;
    document.getElementById('sectionTitle').textContent = title;
    displayVideos(filtered);
}

// RECHERCHE
document.getElementById('searchInput').addEventListener('input', function(e) {
    const searchTerm = e.target.value.toLowerCase();    
    if (searchTerm === '') {
        filterVideos(currentFilter, document.querySelector('.filter-btn.active'));
        return;
    }
    
    const filtered = videos.filter(v => 
        v.title.toLowerCase().includes(searchTerm) || 
        v.author.toLowerCase().includes(searchTerm)
    );
    
    document.getElementById('sectionTitle').textContent = '🔍 Résultats';
    displayVideos(filtered);
});

// MODAL VIDÉO
function openVideo(id) {
    currentVideo = videos.find(v => v.id === id);
    if (!currentVideo) return;
    
    document.getElementById('modalVideo').src = currentVideo.video_url;
    document.getElementById('modalTitle').textContent = currentVideo.title;
    document.getElementById('modalAuthor').textContent = `Par ${currentVideo.author} • ${currentVideo.views} vues`;
    document.getElementById('videoModal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    document.getElementById('videoModal').classList.remove('active');
    document.getElementById('modalVideo').pause();
    document.getElementById('modalVideo').src = '';
    document.body.style.overflow = '';
}

function downloadVideo() {
    if (!currentVideo) return;
    downloadById(currentVideo.video_url, currentVideo.title);
}

function downloadById(url, title) {
    const link = document.createElement('a');
    link.href = url;
    link.download = title.replace(/\s+/g, '_') + '.mp4';
    link.target = '_blank';
    link.click();
}

function shareVideo() {
    if (navigator.share) {
        navigator.share({            title: currentVideo.title,
            text: `Regarde "${currentVideo.title}" sur AuroraAI.watch`,
            url: window.location.href
        });
    } else {
        navigator.clipboard.writeText(window.location.href);
        showToast('Lien copié ! 📋');
    }
}

// NOUVEAU : Toast notification
function showToast(message) {

// ANIMATION CANVAS
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const particles = [];
const particleCount = window.innerWidth < 768 ? 30 : 50;

for (let i = 0; i < particleCount; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        radius: Math.random() * 2 + 1
    });}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    particles.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;
        
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#f97316';
        ctx.fill();
        
        for (let j = i + 1; j < particles.length; j++) {
            const dx = p.x - particles[j].x;
            const dy = p.y - particles[j].y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < 120) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.strokeStyle = `rgba(249, 115, 22, ${0.3 * (1 - distance / 120)})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
    });
    
    requestAnimationFrame(animate);
}
