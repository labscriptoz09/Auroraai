<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuroraAI.watch — Cinéma IA Next-Gen</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Plus Jakarta Sans',sans-serif;background:#000;color:#fff;overflow-x:hidden;min-height:100vh}
        #plexusCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
        header{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem;background:rgba(0,0,0,0.7);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,175,55,0.15)}
        .header-container{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:1.3rem;font-weight:800;display:inline-flex;align-items:center;gap:.7rem;text-decoration:none;cursor:pointer;color:#d4af37}
        .menu-btn{width:44px;height:44px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.2);border-radius:12px;color:#d4af37;font-size:1.2rem;cursor:pointer}
        .mobile-menu{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.97);backdrop-filter:blur(30px);z-index:200;display:none;flex-direction:column;justify-content:center;align-items:center;gap:1.5rem;padding:2rem}
        .mobile-menu.active{display:flex}
        .mobile-menu a{color:#d4af37;text-decoration:none;font-size:1.3rem;font-weight:700}
        .close-btn{position:absolute;top:1rem;right:1rem;width:44px;height:44px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.2);border-radius:12px;color:#d4af37;font-size:1.3rem;cursor:pointer}
        .hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:6rem 1rem 3rem;position:relative;z-index:10}
        .badge{display:inline-block;padding:.4rem 1rem;background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.3);border-radius:100px;font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:#d4af37;margin-bottom:1.5rem}
        .hero h1{font-size:clamp(2rem,8vw,3.5rem);font-weight:800;margin-bottom:1rem;background:linear-gradient(180deg,#fff 0%,#d4af37 50%,#b8941f 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
        .hero p{font-size:1rem;color:rgba(255,255,255,0.7);max-width:500px;margin-bottom:2rem}
        .btn{padding:1rem 2rem;border:none;border-radius:50px;font-weight:700;cursor:pointer;width:100%;max-width:300px;margin:.5rem;font-family:inherit}
        .btn-primary{background:linear-gradient(135deg,#d4af37,#b8941f);color:#000}
        .btn-secondary{background:rgba(212,175,55,0.1);border:1px solid rgba(212,175,55,0.3);color:#d4af37}
        .content{max-width:1400px;margin:0 auto;padding:1rem;position:relative;z-index:10}
        .section-title{font-size:1.5rem;font-weight:700;color:#d4af37;margin-bottom:1.5rem}
        .video-grid{display:grid;grid-template-columns:1fr;gap:1rem}
        @media(min-width:768px){.video-grid{grid-template-columns:repeat(2,1fr)}}
        @media(min-width:1024px){.video-grid{grid-template-columns:repeat(3,1fr)}}
    </style>
</head>
<body>
<canvas id="plexusCanvas"></canvas>

<header>
    <div class="header-container">
        <div class="logo" onclick="showHome()">
            <i class="fas fa-play-circle" style="font-size:2rem"></i>
            <span>AuroraAI</span>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </div>
</header>

<div class="mobile-menu" id="mobileMenu">
    <button class="close-btn" onclick="toggleMenu()">✕</button>
    <a href="#" onclick="toggleMenu();showHome()">Accueil</a>
    <a href="#" onclick="toggleMenu();showUpload()">🎬 Upload Vidéo</a>
    <a href="#" onclick="toggleMenu();showAllVideos()">Explorer</a></div>

<div id="homePage">
    <section class="hero" id="hero">
        <div class="badge">Plateforme Cinéma & Séries IA</div>
        <h1>L'IA réinvente<br>le cinéma</h1>
        <p>Découvrez, téléchargez et soutenez les meilleurs films et séries générés par intelligence artificielle.</p>
        <div>
            <button class="btn btn-primary" onclick="document.getElementById('content').scrollIntoView({behavior:'smooth'})">📥 Télécharger</button>
            <button class="btn btn-secondary" onclick="showUpload()">📤 Partager vidéo AI</button>
        </div>
    </section>

    <section class="content" id="content">
        <h2 class="section-title">🔥 Tendances</h2>
        <div class="video-grid" id="videoGrid">
            <p style="text-align:center;color:rgba(255,255,255,0.5);padding:3rem">Aucune vidéo - Commence par uploader !</p>
        </div>
    </section>
</div>

<div id="uploadPage" style="display:none;min-height:100vh;padding:8rem 2rem 3rem;position:relative;z-index:10">
    <div style="max-width:600px;margin:0 auto;text-align:center">
        <h1 style="font-size:2rem;margin-bottom:1rem;background:linear-gradient(180deg,#fff,#d4af37);-webkit-background-clip:text;background-clip:text;color:transparent">🎬 Upload Vidéo</h1>
        <p style="color:rgba(255,255,255,0.7);margin-bottom:2rem">Partagez votre création IA</p>
        <button class="btn btn-primary" onclick="showHome()">Retour à l'accueil</button>
    </div>
</div>

<script>
// FOND ANIMÉ PLEXUS DORÉ
(function(){
    const canvas=document.getElementById('plexusCanvas');
    const ctx=canvas.getContext('2d');
    
    function resize(){
        canvas.width=window.innerWidth;
        canvas.height=window.innerHeight;
    }
    
    class Particle{
        constructor(){
            this.x=Math.random()*canvas.width;
            this.y=Math.random()*canvas.height;
            this.vx=(Math.random()-0.5)*0.3;
            this.vy=(Math.random()-0.5)*0.3;
            this.size=Math.random()*2+1;
        }
        update(){
            this.x+=this.vx;            this.y+=this.vy;
            if(this.x<0||this.x>canvas.width)this.vx*=-1;
            if(this.y<0||this.y>canvas.height)this.vy*=-1;
        }
        draw(){
            ctx.beginPath();
            ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
            ctx.fillStyle='rgba(212,175,55,0.5)';
            ctx.fill();
        }
    }
    
    let particles=[];
    const particleCount=40;
    
    function init(){
        particles=[];
        for(let i=0;i<particleCount;i++)particles.push(new Particle());
    }
    
    function drawConnections(){
        for(let i=0;i<particles.length;i++){
            for(let j=i+1;j<particles.length;j++){
                const dx=particles[i].x-particles[j].x;
                const dy=particles[i].y-particles[j].y;
                const distance=Math.sqrt(dx*dx+dy*dy);
                if(distance<200){
                    const opacity=(1-distance/200)*0.2;
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x,particles[i].y);
                    ctx.lineTo(particles[j].x,particles[j].y);
                    ctx.strokeStyle=`rgba(212,175,55,${opacity})`;
                    ctx.lineWidth=1.7;
                    ctx.stroke();
                }
            }
        }
    }
    
    function animate(){
        ctx.fillStyle='#000';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        particles.forEach(p=>{
            p.update();
            p.draw();
        });
        drawConnections();
        requestAnimationFrame(animate);
    }
        resize();
    init();
    animate();
    window.addEventListener('resize',()=>{resize();init();});
})();

// NAVIGATION
function showHome(){
    document.getElementById('homePage').style.display='block';
    document.getElementById('uploadPage').style.display='none';
    document.getElementById('hero').scrollIntoView({behavior:'smooth'});
}

function showUpload(){
    document.getElementById('homePage').style.display='none';
    document.getElementById('uploadPage').style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
}

function toggleMenu(){
    document.getElementById('mobileMenu').classList.toggle('active');
}

function showAllVideos(){
    showHome();
    document.getElementById('content').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
