<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostic AuroraAI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:sans-serif;padding:1rem;min-height:100vh}
h1{color:#d4af37;font-size:1.5rem;margin-bottom:1rem;text-align:center}
.test{background:#111;border:1px solid #333;border-radius:10px;padding:1rem;margin-bottom:0.8rem}
.test h3{font-size:0.9rem;margin-bottom:0.5rem;color:#888}
.result{font-size:0.85rem;word-break:break-all;line-height:1.4}
.ok{color:#4caf50;font-weight:700}
.ko{color:#f44336;font-weight:700}
.wait{color:#ff9800}
pre{background:#1a1a1a;padding:0.5rem;border-radius:5px;overflow-x:auto;font-size:0.75rem;margin-top:0.3rem;color:#ccc}
.btn{display:block;width:100%;padding:1rem;background:linear-gradient(135deg,#d4af37,#b8941f);border:none;border-radius:10px;color:#000;font-weight:700;font-size:1rem;cursor:pointer;margin-bottom:1rem}
.summary{background:#1a1a0a;border:2px solid #d4af37;border-radius:10px;padding:1rem;margin-top:1rem;text-align:center}
</style>
</head>
<body>
<h1>🔍 Diagnostic Supabase AuroraAI</h1>
<button class="btn" onclick="runAllTests()">▶️ LANCER TOUS LES TESTS</button>
<div id="results"></div>
<div id="summary" class="summary" style="display:none"></div>

<script>
var supabaseClient = null;
var testResults = [];

function log(num, title, status, detail) {
  var cls = status === 'ok' ? 'ok' : (status === 'ko' ? 'ko' : 'wait');
  var icon = status === 'ok' ? '✅' : (status === 'ko' ? '❌' : '⏳');
  var html = '<div class="test"><h3>' + num + '. ' + title + '</h3>';
  html += '<div class="result ' + cls + '">' + icon + ' ';
  if (status === 'ok') html += 'OK';
  else if (status === 'ko') html += 'ERREUR';
  else html += 'En cours...';
  html += '</div>';
  if (detail) html += '<pre>' + detail + '</pre>';
  html += '</div>';
  document.getElementById('results').innerHTML += html;
  testResults.push({ num: num, title: title, status: status });
}

async function runAllTests() {
  document.getElementById('results').innerHTML = '';
  document.getElementById('summary').style.display = 'none';  testResults = [];

  // Connexion Supabase
  try {
    supabaseClient = window.supabase.createClient(
      'https://knecqgspkalwepdwwpud.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuZWNxZ3Nwa2Fsd2VwZHd3cHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODUyNjUsImV4cCI6MjA5Njk2MTI2NX0.giDQFM5k2wQBlXAD10XKF8BRcg_jmABkjvQQ8ai7pww'
    );
    log('1', 'Connexion Supabase', 'ok', 'Client créé avec succès');
  } catch(e) {
    log('1', 'Connexion Supabase', 'ko', e.message);
    showSummary();
    return;
  }

  // Test 2: Table comments existe
  try {
    var r = await supabaseClient.from('comments').select('*').limit(1);
    if (r.error && r.error.code === '42P01') {
      log('2', 'Table comments existe', 'ko', 'La table comments N\'EXISTE PAS. Crée-la dans SQL Editor.');
    } else if (r.error) {
      log('2', 'Table comments existe', 'ko', r.error.message);
    } else {
      log('2', 'Table comments existe', 'ok', 'Table trouvée');
    }
  } catch(e) {
    log('2', 'Table comments existe', 'ko', e.message);
  }

  // Test 3: RLS activé
  try {
    var r = await supabaseClient.rpc('exec_sql', { sql: "SELECT relrowsecurity FROM pg_class WHERE relname='comments'" });
    if (r.data && r.data.length > 0 && r.data[0].relrowsecurity === true) {
      log('3', 'RLS activé sur comments', 'ok', 'relrowsecurity = true');
    } else {
      log('3', 'RLS activé sur comments', 'ko', 'RLS DÉSACTIVÉ ou non détecté. Exécute: ALTER TABLE comments ENABLE ROW LEVEL SECURITY;');
    }
  } catch(e) {
    // Si rpc exec_sql n'existe pas, on teste autrement
    log('3', 'RLS activé sur comments', 'wait', 'Test RPC non disponible. Vérifie manuellement dans Supabase > Authentication > Policies');
  }

  // Test 4: Lecture commentaires
  try {
    var r = await supabaseClient.from('comments').select('*').order('created_at', { ascending: false }).limit(5);
    if (r.error) {
      log('4', 'Lecture commentaires (SELECT)', 'ko', r.error.message + '\nCode: ' + r.error.code);
    } else {
      var count = r.data ? r.data.length : 0;
      var detail = count + ' commentaire(s) trouvé(s)';      if (count > 0) {
        detail += '\n' + JSON.stringify(r.data.map(function(c) {
          return { id: c.id, video_id: c.video_id, author: c.author_name, content: c.content.substring(0, 30) };
        }), null, 2);
      }
      log('4', 'Lecture commentaires (SELECT)', 'ok', detail);
    }
  } catch(e) {
    log('4', 'Lecture commentaires (SELECT)', 'ko', e.message);
  }

  // Test 5: Insertion commentaire
  try {
    var testId = Date.now();
    var r = await supabaseClient.from('comments').insert([{
      video_id: 1781690112139,
      author_name: 'Diagnostic_' + testId,
      author_email: null,
      content: 'Test automatique diagnostic'
    }]);
    if (r.error) {
      log('5', 'Insertion commentaire (INSERT)', 'ko', r.error.message + '\nCode: ' + r.error.code + '\n\nSi code 42501 = politique INSERT manquante.\nExécute: CREATE POLICY Public_Insert_Comments ON comments FOR INSERT WITH CHECK (true);');
    } else {
      log('5', 'Insertion commentaire (INSERT)', 'ok', 'Commentaire inséré avec succès');
      // Nettoyage
      await supabaseClient.from('comments').delete().eq('author_name', 'Diagnostic_' + testId);
    }
  } catch(e) {
    log('5', 'Insertion commentaire (INSERT)', 'ko', e.message);
  }

  // Test 6: Vidéo cible existe
  try {
    var r = await supabaseClient.from('videos').select('id, title').eq('id', 1781690112139);
    if (r.error) {
      log('6', 'Vidéo ID 1781690112139 existe', 'ko', r.error.message);
    } else if (!r.data || r.data.length === 0) {
      log('6', 'Vidéo ID 1781690112139 existe', 'ko', 'Cette vidéo N\'EXISTE PAS dans Supabase');
    } else {
      log('6', 'Vidéo ID 1781690112139 existe', 'ok', 'Titre: ' + r.data[0].title);
    }
  } catch(e) {
    log('6', 'Vidéo ID 1781690112139 existe', 'ko', e.message);
  }

  // Test 7: Commentaires pour la vidéo cible
  try {
    var r = await supabaseClient.from('comments').select('*').eq('video_id', 1781690112139).order('created_at', { ascending: false });
    if (r.error) {
      log('7', 'Commentaires vidéo 1781690112139', 'ko', r.error.message);    } else {
      var count = r.data ? r.data.length : 0;
      var detail = count + ' commentaire(s) pour cette vidéo';
      if (count > 0) {
        detail += '\n' + JSON.stringify(r.data.map(function(c) {
          return { id: c.id, author: c.author_name, content: c.content.substring(0, 50), date: c.created_at };
        }), null, 2);
      }
      log('7', 'Commentaires vidéo 1781690112139', count > 0 ? 'ok' : 'ko', detail);
    }
  } catch(e) {
    log('7', 'Commentaires vidéo 1781690112139', 'ko', e.message);
  }

  // Test 8: Types compatibles
  try {
    var rv = await supabaseClient.from('videos').select('id').limit(1);
    var rc = await supabaseClient.from('comments').select('video_id').limit(1);
    var vidType = rv.data && rv.data.length > 0 ? typeof rv.data[0].id : 'inconnu';
    var cidType = rc.data && rc.data.length > 0 ? typeof rc.data[0].video_id : 'inconnu';
    var match = vidType === cidType;
    log('8', 'Types video_id compatibles', match ? 'ok' : 'ko',
      'videos.id type: ' + vidType + '\ncomments.video_id type: ' + cidType +
      (match ? '\n✅ Types identiques' : '\n❌ TYPES DIFFÉRENTS ! C\'est le problème !'));
  } catch(e) {
    log('8', 'Types video_id compatibles', 'ko', e.message);
  }

  // Test 9: Politiques RLS
  try {
    var r = await supabaseClient.from('comments').select('*').limit(0);
    log('9', 'Politique SELECT fonctionne', 'ok', 'La requête SELECT passe sans erreur');
  } catch(e) {
    log('9', 'Politique SELECT fonctionne', 'ko', e.message);
  }

  showSummary();
}

function showSummary() {
  var ok = testResults.filter(function(t) { return t.status === 'ok'; }).length;
  var ko = testResults.filter(function(t) { return t.status === 'ko'; }).length;
  var total = testResults.length;
  var s = document.getElementById('summary');
  s.style.display = 'block';
  var color = ko === 0 ? '#4caf50' : '#f44336';
  s.innerHTML = '<h2 style="color:' + color + ';margin-bottom:0.5rem">' +
    (ko === 0 ? '✅ TOUT EST OK !' : '❌ ' + ko + ' ERREUR(S) DÉTECTÉE(S)') +
    '</h2><p>' + ok + '/' + total + ' tests réussis</p>' +
    (ko > 0 ? '<p style="margin-top:0.5rem;color:#ff9800">Copie ce résultat et envoie-le moi</p>' : '');}
</script>
</body>
</html>
