<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AuroraAI.watch — Films IA</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23000'/%3E%3Cpolygon points='12,8 24,16 12,24' fill='%23d4af37' stroke='%23d4af37' stroke-width='1.5' stroke-linejoin='round'%3E%3Canimate attributeName='opacity' values='1;0.6;1' dur='2.5s' repeatCount='indefinite'/%3E%3C/polygon%3E%3C/svg%3E">
<meta name="theme-color" content="#000000">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
#plexusCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ===== CINEMATIC INTRO 5s ===== */
#cinematicIntro{position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.8s ease}
#cinematicIntro.fade-out{opacity:0;pointer-events:none}
.intro-logo{width:120px;height:120px;border:3px solid #d4af37;border-radius:20px;display:flex;align-items:center;justify-content:center;animation:introPulse 2s ease-in-out infinite;box-shadow:0 0 60px rgba(212,175,55,0.4)}
.intro-logo::before{content:'';width:0;height:0;border-top:18px solid transparent;border-bottom:18px solid transparent;border-left:30px solid #d4af37;margin-left:6px}
@keyframes introPulse{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(212,175,55,0.3)}50%{transform:scale(1.05);box-shadow:0 0 80px rgba(212,175,55,0.6)}}
.intro-title{color:#d4af37;font-size:2.5rem;font-weight:900;letter-spacing:4px;margin-top:1.5rem;opacity:0;animation:introFadeIn 1s ease 0.5s forwards}
.intro-subtitle{color:rgba(255,255,255,0.5);font-size:0.9rem;letter-spacing:6px;text-transform:uppercase;margin-top:0.5rem;opacity:0;animation:introFadeIn 1s ease 1s forwards}
.intro-loader{width:200px;height:3px;background:rgba(212,175,55,0.15);border-radius:2px;margin-top:2rem;overflow:hidden;opacity:0;animation:introFadeIn 1s ease 1.2s forwards}
.intro-loader-bar{height:100%;background:linear-gradient(90deg,#d4af37,#fff,#d4af37);border-radius:2px;width:0%;animation:introLoad 3.5s ease-in-out 1.5s forwards}
@keyframes introFadeIn{to{opacity:1}}
@keyframes introLoad{0%{width:0%}40%{width:60%}70%{width:85%}100%{width:100%}}

/* ===== HEADER ===== */
header{position:fixed;top:0;left:0;right:0;z-index:100;padding:0.8rem 1rem;background:rgba(0,0,0,0.85);backdrop-filter:blur(15px);border-bottom:1px solid rgba(212,175,55,0.15);display:flex;justify-content:space-between;align-items:center;transition:transform 0.3s ease}
header.hidden{transform:translateY(-100%)}
.logo-container{display:flex;align-items:center;gap:0.6rem;text-decoration:none;cursor:pointer}
.play-icon{width:32px;height:32px;border:2px solid #d4af37;border-radius:6px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(212,175,55,0.4);transition:all 0.3s}
.play-icon::before{content:'';width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid #d4af37;margin-left:2px}
.logo-container:hover .play-icon{box-shadow:0 0 20px rgba(212,175,55,0.7);transform:scale(1.05)}
.logo{font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:0.8rem}
.points-badge{background:linear-gradient(135deg,rgba(212,175,55,0.2),rgba(212,175,55,0.05));border:1px solid rgba(212,175,55,0.4);border-radius:20px;padding:0.35rem 0.8rem;display:flex;align-items:center;gap:0.4rem;font-size:0.8rem;font-weight:700;color:#d4af37;cursor:pointer;transition:all 0.3s;text-decoration:none}
.points-badge:hover{background:linear-gradient(135deg,rgba(212,175,55,0.35),rgba(212,175,55,0.1));box-shadow:0 0 15px rgba(212,175,55,0.3);transform:translateY(-1px)}
.points-badge svg{width:14px;height:14px;fill:#d4af37}
.upload-btn{background:linear-gradient(135deg,#d4af37,#b8941f);color:#000;border:none;border-radius:10px;padding:0.45rem 1rem;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.3s;text-decoration:none;display:flex;align-items:center;gap:0.3rem}
.upload-btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(212,175,55,0.4)}
.menu-toggle{background:none;border:1px solid rgba(212,175,55,0.3);border-radius:8px;padding:0.4rem;cursor:pointer;display:none;flex-direction:column;gap:3px;width:36px;height:36px;align-items:center;justify-content:center;transition:all 0.3s}
.menu-toggle span{display:block;width:18px;height:2px;background:#d4af37;border-radius:1px;transition:all 0.3s}
.menu-toggle.active span:nth-child(1){transform:rotate(45deg) translate(3px,3px)}
.menu-toggle.active span:nth-child(2){opacity:0}
.menu-toggle.active span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

/* ===== MOBILE MENU ===== */
.mobile-menu{position:fixed;top:0;left:0;right:0;bottom:0;z-index:99;background:rgba(0,0,0,0.97);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;opacity:0;pointer-events:none;transition:opacity 0.3s ease}
.mobile-menu.active{opacity:1;pointer-events:all}.menu-link{color:#fff;text-decoration:none;font-size:1.3rem;font-weight:700;letter-spacing:2px;display:flex;align-items:center;gap:0.8rem;padding:0.8rem 1.5rem;border-radius:12px;transition:all 0.3s;border:1px solid transparent}
.menu-link:hover,.menu-link:active{color:#d4af37;background:rgba(212,175,55,0.08);border-color:rgba(212,175,55,0.2)}
.menu-link svg{width:24px;height:24px;stroke:#d4af37;fill:none;stroke-width:1.5}

/* ===== MAIN ===== */
.main{position:relative;z-index:10;max-width:1200px;margin:0 auto;padding:4.5rem 1rem 6rem;opacity:0;transition:opacity 0.5s ease}
.section-title{color:#d4af37;font-size:1.5rem;font-weight:800;margin-bottom:1.5rem;letter-spacing:1px;display:flex;align-items:center;gap:0.6rem}
.section-title::before{content:'';width:4px;height:24px;background:#d4af37;border-radius:2px}

/* ===== FILM GRID ===== */
.film-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem}
.film-card{background:rgba(255,255,255,0.03);border:1px solid rgba(212,175,55,0.1);border-radius:16px;overflow:hidden;transition:all 0.3s;cursor:pointer;position:relative}
.film-card:hover{transform:translateY(-4px);border-color:rgba(212,175,55,0.4);box-shadow:0 8px 30px rgba(0,0,0,0.5)}
.film-thumb{width:100%;aspect-ratio:16/9;background:#111;position:relative;overflow:hidden}
.film-thumb img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
.film-card:hover .film-thumb img{transform:scale(1.05)}
.film-duration{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.8);color:#fff;font-size:0.7rem;padding:2px 6px;border-radius:4px;font-weight:600}
.film-play-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);opacity:0;transition:opacity 0.3s}
.film-card:hover .film-play-overlay{opacity:1}
.film-play-btn{width:50px;height:50px;background:rgba(212,175,55,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(212,175,55,0.5)}
.film-play-btn::before{content:'';width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:14px solid #000;margin-left:3px}
.film-info{padding:0.8rem}
.film-title{color:#fff;font-size:0.95rem;font-weight:700;margin-bottom:0.3rem;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.film-meta{display:flex;justify-content:space-between;align-items:center;margin-top:0.4rem}
.film-author{color:rgba(255,255,255,0.5);font-size:0.75rem}
.film-stats{display:flex;gap:0.6rem;align-items:center}
.film-stat{display:flex;align-items:center;gap:0.2rem;color:rgba(255,255,255,0.4);font-size:0.7rem}
.film-stat svg{width:12px;height:12px;fill:currentColor}
.film-rating{display:flex;align-items:center;gap:0.2rem;color:#d4af37;font-size:0.75rem;font-weight:700}
.film-rating svg{width:12px;height:12px;fill:#d4af37}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:4rem 1rem;color:rgba(255,255,255,0.3)}
.empty-state svg{width:64px;height:64px;stroke:rgba(212,175,55,0.3);fill:none;stroke-width:1;margin-bottom:1rem}
.empty-state p{font-size:1rem;margin-bottom:0.5rem}
.empty-state small{font-size:0.8rem;color:rgba(255,255,255,0.2)}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);z-index:200;background:rgba(0,0,0,0.95);border:1px solid rgba(212,175,55,0.4);border-radius:12px;padding:0.8rem 1.5rem;color:#d4af37;font-weight:600;font-size:0.85rem;opacity:0;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none;white-space:nowrap;box-shadow:0 4px 30px rgba(0,0,0,0.5)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ===== FOOTER ===== */
footer{position:relative;z-index:10;text-align:center;padding:2rem 1rem;border-top:1px solid rgba(212,175,55,0.1);color:rgba(255,255,255,0.2);font-size:0.7rem;letter-spacing:1px}
footer a{color:rgba(212,175,55,0.4);text-decoration:none;transition:color 0.3s}
footer a:hover{color:#d4af37}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
.menu-toggle{display:flex}
.upload-btn span{display:none}.upload-btn{padding:0.45rem 0.7rem}
.film-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.8rem}
.film-info{padding:0.6rem}
.film-title{font-size:0.8rem}
.section-title{font-size:1.2rem}
.logo{font-size:1.1rem}
.points-badge{padding:0.3rem 0.6rem;font-size:0.7rem}
.intro-title{font-size:1.8rem}
.intro-logo{width:80px;height:80px;border-radius:14px}
.intro-logo::before{border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:20px solid #d4af37;margin-left:4px}
}
@media(max-width:400px){
.film-grid{grid-template-columns:repeat(2,1fr);gap:0.6rem}
.film-author{display:none}
header{padding:0.6rem 0.8rem}
}
</style>
</head>
<body>

<div class="main" id="mainContent">

<script>
var APP=window.APP||{};window.APP=APP;

// MODE OFFLINE CHECK
(async function(){try{
var _sb=window.supabase.createClient('https://knecqgspkalwepdwwpud.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuZWNxZ3Nwa2Fsd2VwZHd3cHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODUyNjUsImV4cCI6MjA5Njk2MTI2NX0.giDQFM5k2wQBlXAD10XKF8BRcg_jmABkjvQQ8ai7pww');
var _r=await _sb.from('site_settings').select('offline_mode,offline_msg').eq('id',1).single();
if(!_r.error&&_r.data&&_r.data.offline_mode){
document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#000;color:#fff;font-family:sans-serif;text-align:center;padding:2rem"><div><h1 style="color:#d4af37;font-size:2rem;margin-bottom:1rem">🚧 Site en maintenance</h1><p style="color:rgba(255,255,255,0.6);font-size:1.1rem">'+(_r.data.offline_msg||'Revenez bientôt !')+'</p></div></div>';
throw new Error('OFFLINE_MODE');
}
}catch(e){if(e.message==='OFFLINE_MODE')return;}
})();

var viewerId=(function(){var v=localStorage.getItem('aurora_viewer_id');if(!v){v='viewer_'+Date.now()+'_'+Math.random().toString(36).substr(2,9);localStorage.setItem('aurora_viewer_id',v);}return v;})();
var supabaseUrl='https://knecqgspkalwepdwwpud.supabase.co';
var supabaseKey='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuZWNxZ3Nwa2Fsd2VwZHd3cHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODUyNjUsImV4cCI6MjA5Njk2MTI2NX0.giDQFM5k2wQBlXAD10XKF8BRcg_jmABkjvQQ8ai7pww';
var sb=window.supabase.createClient(supabaseUrl,supabaseKey);
var userPoints=0;

async function loadUserPoints(){
try{
var se=localStorage.getItem('aurora_saved_email'),r=null;
if(se)r=await sb.from('user_points').select('total_points').eq('email',se).single();
if(!r||r.error)r=await sb.from('user_points').select('total_points').eq('viewer_id',viewerId).single();
if(!r.error&&r.data){userPoints=r.data.total_points;updatePointsDisplay();}
}catch(e){console.log('[Points]',e);}
}

function updatePointsDisplay(){var el=document.getElementById('pointsValue');if(el)el.textContent=fmt(userPoints);}
function fmt(n){n=parseInt(n);if(isNaN(n))return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'k';return''+n;}

async function loadFilms(){
var grid=document.getElementById('filmGrid');
try{
var {data,error}=await sb.from('films').select('*').eq('status','approved').order('created_at',{ascending:false}).limit(50);
if(error||!data||data.length===0){
grid.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg><p>Aucun film disponible</p><small>Soyez le premier à uploader !</small></div>';
return;
}
var html='';
data.forEach(function(f){
var thumb=f.thumbnail_url||'';
var views=fmt(f.views||0);
var likes=fmt(f.likes||0);
var rating=f.avg_rating?parseFloat(f.avg_rating).toFixed(1):'—';
var duration=f.duration||'';
html+='<div class="film-card" onclick="APP.openFilm(\''+f.id+'\')">';
html+='<div class="film-thumb">';
if(thumb)html+='<img src="'+thumb+'" alt="" loading="lazy">';
else html+='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.1);font-size:2rem">🎬</div>';
if(duration)html+='<div class="film-duration">'+duration+'</div>';
html+='<div class="film-play-overlay"><div class="film-play-btn"></div></div></div>';
html+='<div class="film-info"><div class="film-title">'+f.title+'</div>';html+='<div class="film-meta"><div class="film-author">@'+(f.creator_name||'anonyme')+'</div>';
html+='<div class="film-stats">';
html+='<div class="film-stat"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'+views+'</div>';
html+='<div class="film-stat"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'+likes+'</div>';
if(rating!=='—')html+='<div class="film-rating"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'+rating+'</div>';
html+='</div></div></div></div>';
});
grid.innerHTML=html;
}catch(e){grid.innerHTML='<div class="empty-state"><p>Erreur de chargement</p></div>';}
}

APP.openFilm=function(id){window.location.href='/player.html?id='+id;};
APP.toggleMenu=function(){
var m=document.getElementById('mobileMenu'),b=document.getElementById('menuToggle');
if(m&&b){m.classList.toggle('active');b.classList.toggle('active');document.body.style.overflow=m.classList.contains('active')?'hidden':'';}
};
document.getElementById('menuToggle').addEventListener('click',APP.toggleMenu);

var lastScroll=0;
window.addEventListener('scroll',function(){
var h=document.getElementById('mainHeader'),st=window.pageYOffset;
if(st>100&&st>lastScroll)h.classList.add('hidden');else h.classList.remove('hidden');
lastScroll=st;
},{passive:true});

APP.showToast=function(msg){var t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);};

// CINEMATIC INTRO 5s → FADE OUT → AFFICHE CONTENU
(function(){
var intro=document.getElementById('cinematicIntro'),main=document.getElementById('mainContent');
setTimeout(function(){
if(intro)intro.classList.add('fade-out');
if(main)main.style.opacity='1';
setTimeout(function(){if(intro)intro.style.display='none';},800);
},5000);
})();

loadUserPoints();
loadFilms();
</script>
</body>
