async function loadProfile(){
var sb=null,userEmail='',streak=0,myCommentsList=[],receivedCommentsList=[],ratingsList=[];
var likesCount=0,viewsCount=0,videosPublished=[],favorites=JSON.parse(localStorage.getItem('aurorafavs')||'[]');
try{
sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var se=localStorage.getItem('aurora_saved_email'),pr=null;if(se)pr=await sb.from('user_points').select('*').eq('email',se).single();
if(!pr||pr.error)pr=await sb.from('user_points').select('*').eq('viewer_id',viewerId).single();
if(!pr.error&&pr.data){userPoints=pr.data.total_points||0;userEmail=pr.data.email||'';streak=pr.data.current_streak||0;}
var cr=await sb.from('comments').select('*,video_stats(title)').eq('viewer_id',viewerId).order('created_at',{ascending:false}).limit(10);
if(!cr.error&&cr.data&&cr.data.length>0)myCommentsList=cr.data;
else if(userEmail){var cr2=await sb.from('comments').select('*,video_stats(title)').eq('author_email',userEmail).order('created_at',{ascending:false}).limit(10);if(!cr2.error&&cr2.data)myCommentsList=cr2.data;}
var rr=await sb.from('video_ratings').select('*,video_stats(title)').eq('viewer_id',viewerId).order('created_at',{ascending:false}).limit(10);
if(!rr.error&&rr.data)ratingsList=rr.data;
var lr=await sb.from('video_likes_history').select('id').eq('viewer_id',viewerId);
if(!lr.error&&lr.data)likesCount=lr.data.length;
var vr=await sb.from('video_views').select('id').eq('viewer_id',viewerId);
if(!vr.error&&vr.data)viewsCount=vr.data.length;
// Triple recherche vidéos publiées
var myVids=await sb.from('videos').select('*').eq('viewer_id',viewerId).order('created_at',{ascending:false});
if(!myVids.error&&myVids.data&&myVids.data.length>0)videosPublished=myVids.data;
if(videosPublished.length===0&&userEmail){var ou=await sb.from('user_points').select('viewer_id').eq('email',userEmail).single();if(!ou.error&&ou.data&&ou.data.viewer_id!==viewerId){var mv2=await sb.from('videos').select('*').eq('viewer_id',ou.data.viewer_id).order('created_at',{ascending:false});if(!mv2.error&&mv2.data&&mv2.data.length>0)videosPublished=mv2.data;}}
if(videosPublished.length===0&&userEmail){var an=userEmail.split('@')[0];if(an){var mv3=await sb.from('videos').select('*').ilike('author',an).order('created_at',{ascending:false});if(!mv3.error&&mv3.data&&mv3.data.length>0)videosPublished=mv3.data;}}
// Stats live depuis video_stats
if(videosPublished.length>0){
var vids=videosPublished.map(function(v){return v.id;});
var ls=await sb.from('video_stats').select('id,views,likes,rating').in('id',vids);
if(!ls.error&&ls.data){var sm={};ls.data.forEach(function(s){sm[s.id]=s;});videosPublished=videosPublished.map(function(v){var l=sm[v.id];if(l){v.views=l.views||0;v.likes=l.likes||0;v.rating=l.rating||v.rating||0;}return v;});}
// Commentaires reçus sur mes vidéos
var rc=await sb.from('comments').select('*').in('video_id',vids).order('created_at',{ascending:false}).limit(20);
if(!rc.error&&rc.data)receivedCommentsList=rc.data;
}
}catch(e){console.log('[Profil]',e);}
var shares=0;for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('shares_today_')===0)shares+=parseInt(localStorage.getItem(k)||'0');}
var emailSaved=!!localStorage.getItem('aurora_saved_email');
var ctv=0,ctl=0,mvv=0,mvl=0;
videosPublished.forEach(function(v){ctv+=(v.views||0);ctl+=(v.likes||0);if((v.views||0)>mvv)mvv=v.views||0;if((v.likes||0)>mvl)mvl=v.likes||0;});
var stats={points:userPoints,views:viewsCount,likesGiven:likesCount,comments:myCommentsList.length,ratings:ratingsList.length,streak:streak,videosPublished:videosPublished.length,hasRatedVideo:ratingsList.length>0,maxVideoViews:mvv,maxVideoLikes:mvl,tipsReceived:0,shares:shares,emailSaved:emailSaved,allOtherBadges:false};
var unlocked=[],allE=true;
BADGES_DATA.forEach(function(b){if(b.id===20)return;if(b.check(stats))unlocked.push(b.id);else allE=false;});
if(allE&&unlocked.length===19)unlocked.push(20);
var currentBadge=BADGES_DATA[0];for(var j=BADGES_DATA.length-1;j>=0;j--){if(unlocked.indexOf(BADGES_DATA[j].id)!==-1){currentBadge=BADGES_DATA[j];break;}}
var ms='';try{var vp=viewerId.split('_');if(vp.length>=2){var ts=parseInt(vp[1]);if(ts>1700000000000)ms=new Date(ts).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});}}catch(e){}if(!ms)ms='Juin 2026';
renderProfile({points:userPoints,email:userEmail,streak:streak,currentBadge:currentBadge,unlocked:unlocked,myComments:myCommentsList,receivedComments:receivedCommentsList,ratings:ratingsList,likesCount:likesCount,viewsCount:viewsCount,favorites:favorites,shares:shares,memberSince:ms,videosPublished:videosPublished,creatorTotalViews:ctv,creatorTotalLikes:ctl});
}

async function replyToComment(commentId,videoId){
var form=document.getElementById('reply-form-'+commentId);
var ta=form.querySelector('textarea'),text=ta.value.trim();
if(!text){alert('Écrivez une réponse');return;}
var btn=form.querySelector('.reply-send');btn.textContent='Envoi...';btn.disabled=true;
try{
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var un=localStorage.getItem('aurora_saved_email')?localStorage.getItem('aurora_saved_email').split('@')[0]:'Créateur';
var r=await sb.from('comments').insert([{video_id:videoId,author_name:un,author_email:localStorage.getItem('aurora_saved_email')||null,content:text,viewer_id:viewerId,parent_comment_id:commentId,is_creator_reply:true}]);
if(r.error)throw r.error;ta.value='';form.classList.remove('active');btn.textContent='Envoyer';btn.disabled=false;
var item=form.parentElement,div=document.createElement('div');
div.className='creator-reply';div.id='reply-existing-'+commentId;
div.innerHTML='<strong>🎬 '+esc(un)+' (Créateur)</strong> : '+esc(text);
item.appendChild(div);
}catch(e){alert('Erreur: '+e.message);btn.textContent='Envoyer';btn.disabled=false;}
}
function toggleReplyForm(id){var f=document.getElementById('reply-form-'+id);if(f)f.classList.toggle('active');}

function renderProfile(d){
var c=document.getElementById('profileContent'),pct=Math.round((d.unlocked.length/20)*100),dn=d.email?d.email.split('@')[0]:'Utilisateur',h='';
h+='<div class="profile-header"><div class="profile-avatar">👤</div><div class="profile-name">'+esc(dn)+'</div>';
if(d.email)h+='<div class="profile-email">'+esc(d.email)+'</div>';
h+='<div class="profile-stats-row"><div class="profile-stat"><div class="profile-stat-value">'+fmt(d.points)+'</div><div class="profile-stat-label">Points</div></div><div class="profile-stat"><div class="profile-stat-value">'+d.unlocked.length+'/20</div><div class="profile-stat-label">Badges</div></div><div class="profile-stat"><div class="profile-stat-value">'+d.streak+'j</div><div class="profile-stat-label">Streak</div></div><div class="profile-stat"><div class="profile-stat-value">'+d.memberSince+'</div><div class="profile-stat-label">Membre depuis</div></div></div></div>';
h+='<div class="current-badge-section"><img class="current-badge-img" src="'+d.currentBadge.img+'" alt="'+esc(d.currentBadge.name)+'"><div class="current-badge-info"><div class="current-badge-label">Badge Actuel</div><div class="current-badge-name">'+esc(d.currentBadge.name)+'</div></div></div>';
h+='<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="progress-text"><span>'+pct+'% complété</span><span>'+d.unlocked.length+'/20 badges</span></div></div>';
h+='<div class="section"><div class="section-title">🏆 Collection de Badges</div><div class="badges-grid">';
BADGES_DATA.forEach(function(b){var u=d.unlocked.indexOf(b.id)!==-1;h+='<div class="badge-item '+(u?'unlocked':'locked')+'">';if(!u)h+='<div class="badge-lock">🔒</div>';h+='<img class="badge-img" src="'+b.img+'" alt="'+esc(b.name)+'" loading="lazy"><div class="badge-name">'+esc(b.name)+'</div></div>';});
h+='</div></div>';
h+='<div class="section"><div class="section-title">👤 Mon Activité</div><div class="stats-grid"><div class="stat-card"><div class="stat-card-value">'+d.viewsCount+'</div><div class="stat-card-label">Vidéos vues</div></div><div class="stat-card"><div class="stat-card-value">'+d.likesCount+'</div><div class="stat-card-label">Likes donnés</div></div><div class="stat-card"><div class="stat-card-value">'+d.myComments.length+'</div><div class="stat-card-label">Commentaires</div></div><div class="stat-card"><div class="stat-card-value">'+d.ratings.length+'</div><div class="stat-card-label">Films notés</div></div><div class="stat-card"><div class="stat-card-value">'+d.favorites.length+'</div><div class="stat-card-label">Favoris</div></div><div class="stat-card"><div class="stat-card-value">'+d.shares+'</div><div class="stat-card-label">Partages</div></div></div></div>';
h+='<div class="section"><div class="section-title">🎬 Impact Créateur</div><div class="stats-grid"><div class="stat-card"><div class="stat-card-value">'+d.videosPublished.length+'</div><div class="stat-card-label">Vidéos publiées</div></div><div class="stat-card"><div class="stat-card-value">'+fmt(d.creatorTotalViews)+'</div><div class="stat-card-label">Vues totales</div></div><div class="stat-card"><div class="stat-card-value">'+fmt(d.creatorTotalLikes)+'</div><div class="stat-card-label">Likes reçus</div></div></div></div>';
h+='<div class="section"><div class="section-title">🎥 Mes Vidéos Publiées</div>';
if(d.videosPublished.length===0)h+='<div class="empty-state">Aucune vidéo publiée<br><a href="/upload.html" style="color:#d4af37;text-decoration:none;font-weight:700">Publier votre premier film IA →</a></div>';
else{h+='<div class="my-videos-grid">';d.videosPublished.forEach(function(v){var th=v.thumbnail?'<img src="'+v.thumbnail+'" alt="'+esc(v.title)+'" loading="lazy">':'🎬';h+='<div class="my-video-card" onclick="window.location.href=\'/player.html?id='+v.id+'\'"><div class="my-video-thumb">'+th+'</div><div class="my-video-info"><div class="my-video-title">'+esc(v.title||'Sans titre')+'</div><div class="my-video-stats"><span>👁️ '+fmt(v.views||0)+'</span><span>❤️ '+fmt(v.likes||0)+'</span>'+(v.rating?'<span>⭐ '+v.rating+'</span>':'')+'</div></div></div>';});h+='</div>';}
h+='</div>';
// Commentaires reçus avec bouton répondre
h+='<div class="section"><div class="section-title">💬 Commentaires sur mes vidéos ('+d.receivedComments.length+')</div>';
if(d.receivedComments.length===0)h+='<div class="empty-state">Aucun commentaire reçu</div>';
else{h+='<div class="activity-list">';d.receivedComments.forEach(function(cm){var dt=cm.created_at?new Date(cm.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';var ic=cm.is_creator_reply===true||(cm.author_name&&cm.author_name.indexOf('(Créateur')!==-1);
if(ic){var cn=(cm.author_name||'').replace(' (Créateur)','');h+='<div class="activity-item" style="background:rgba(212,175,55,0.1);border-color:rgba(212,175,55,0.3);border-left:3px solid #d4af37"><div class="activity-icon">🎬</div><div class="activity-content"><div class="activity-text"><strong style="color:#d4af37">'+esc(cn)+' (Créateur)</strong> : '+esc(cm.content)+'</div><div class="activity-meta">'+dt+'</div></div></div>';}
else{h+='<div class="activity-item"><div class="activity-icon">💬</div><div class="activity-content"><div class="activity-text"><strong>'+esc(cm.author_name||'Anonyme')+'</strong> : '+esc(cm.content)+'</div><div class="activity-meta">'+dt+'</div><button class="reply-btn" onclick="toggleReplyForm(\''+cm.id+'\')">↩️ Répondre</button><div class="reply-form" id="reply-form-'+cm.id+'"><textarea placeholder="Répondez en tant que créateur..."></textarea><div class="reply-form-actions"><button class="reply-cancel" onclick="toggleReplyForm(\''+cm.id+'\')">Annuler</button><button class="reply-send" onclick="replyToComment(\''+cm.id+'\',\''+cm.video_id+'\')">Envoyer</button></div></div><div id="reply-existing-'+cm.id+'"></div></div></div>';}});h+='</div>';}
h+='</div>';
// Mes commentaires
h+='<div class="section"><div class="section-title">✍️ Mes Commentaires</div>';
if(d.myComments.length===0)h+='<div class="empty-state">Aucun commentaire écrit</div>';
else{h+='<div class="activity-list">';d.myComments.slice(0,10).forEach(function(cm){var t=cm.video_stats?cm.video_stats.title:'Film',dt=cm.created_at?new Date(cm.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'';h+='<div class="activity-item"><div class="activity-icon">✍️</div><div class="activity-content"><div class="activity-text">« '+esc(cm.content)+' »</div><div class="activity-meta">sur '+esc(t)+(dt?' • '+dt:'')+'</div></div><div class="activity-points">+5 ⭐</div></div>';});h+='</div>';}
h+='</div>';
// Notes
h+='<div class="section"><div class="section-title">⭐ Notes Récentes</div>';
if(d.ratings.length===0)h+='<div class="empty-state">Aucune note</div>';
else{h+='<div class="activity-list">';d.ratings.slice(0,10).forEach(function(r){var t=r.video_stats?r.video_stats.title:'Film',st='',dt=r.created_at?new Date(r.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'';for(var i=1;i<=5;i++)st+=i<=r.rating?'★':'☆';h+='<div class="activity-item"><div class="activity-icon">⭐</div><div class="activity-content"><div class="activity-text">'+esc(t)+' — <span style="color:#d4af37">'+st+'</span></div><div class="activity-meta">'+dt+'</div></div><div class="activity-points">+5 ⭐</div></div>';});h+='</div>';}
h+='</div>';
c.innerHTML=h;
}
loadProfile();
</script>
</body>
</html>
