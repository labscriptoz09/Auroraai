*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
#plexusCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:100;padding:0.8rem 1rem;background:rgba(0,0,0,0.92);backdrop-filter:blur(15px);border-bottom:1px solid rgba(212,175,55,0.2);display:flex;justify-content:space-between;align-items:center}
.logo-container{display:flex;align-items:center;gap:0.6rem;text-decoration:none}
.play-icon{width:32px;height:32px;border:2px solid #d4af37;border-radius:6px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(212,175,55,0.4)}
.play-icon::before{content:'';width:0;height:0;border-top:5px solid transparent;border-bottom:5px solid transparent;border-left:9px solid #d4af37;margin-left:2px}
.logo{font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:1px}
.back-btn{background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.35);color:#d4af37;padding:0.45rem 0.9rem;border-radius:10px;cursor:pointer;font-size:0.8rem;font-weight:600;display:inline-flex;align-items:center;gap:0.35rem;transition:all 0.3s;text-decoration:none;white-space:nowrap;line-height:1}
.back-btn:hover{background:rgba(212,175,55,0.25);border-color:#d4af37;transform:translateY(-1px)}
.back-btn svg{width:14px;height:14px;stroke:#d4af37;fill:none;stroke-width:2;flex-shrink:0}

/* ✅ ALERTE EMAIL SAUVEGARDE */
.save-alert{position:fixed;top:56px;left:0;right:0;z-index:99;background:linear-gradient(135deg,rgba(255,0,0,0.15),rgba(200,0,0,0.1));border-bottom:2px solid #ff4444;padding:1rem;animation:alertPulse 2s ease-in-out infinite}
.save-alert.hidden{display:none}
.save-alert-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:0.8rem;flex-wrap:wrap}
.save-alert-icon{font-size:1.8rem;flex-shrink:0;animation:alertShake 1s ease-in-out infinite}
.save-alert-text{flex:1;min-width:200px}
.save-alert-title{color:#ff4444;font-size:0.95rem;font-weight:900;letter-spacing:0.5px;margin-bottom:0.15rem}
.save-alert-desc{color:rgba(255,255,255,0.7);font-size:0.75rem;line-height:1.3}
.save-alert-form{display:flex;gap:0.4rem;flex-shrink:0}

.save-alert-form input:focus{border-color:#ff4444;background:rgba(255,255,255,0.12)}
.save-alert-form button{padding:0.5rem 1rem;background:linear-gradient(135deg,#ff4444,#cc0000);border:none;border-radius:8px;color:#fff;font-weight:800;font-size:0.8rem;cursor:pointer;white-space:nowrap;transition:all 0.3s}
.save-alert-form button:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(255,68,68,0.4)}
.save-alert-form button:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.save-alert-success{color:#4caf50;font-weight:700;font-size:0.85rem;display:none;align-items:center;gap:0.3rem}
@keyframes alertPulse{0%,100%{background:linear-gradient(135deg,rgba(255,0,0,0.15),rgba(200,0,0,0.1))}50%{background:linear-gradient(135deg,rgba(255,0,0,0.25),rgba(200,0,0,0.18))}}
@keyframes alertShake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}

/* MAIN */
.main{position:relative;z-index:10;max-width:900px;margin:0 auto;padding:5rem 1rem 3rem}
.main.with-alert{padding-top:8rem}

/* BADGE ACTUEL */
.current-badge-section{display:flex;align-items:center;justify-content:center;gap:1.2rem;margin-bottom:2rem;padding:1.5rem;background:linear-gradient(135deg,rgba(212,175,55,0.08),rgba(212,175,55,0.02));border:1px solid rgba(212,175,55,0.25);border-radius:20px}
.current-badge-img{width:70px;height:70px;object-fit:contain;border-radius:12px;filter:drop-shadow(0 0 15px rgba(212,175,55,0.5));animation:badgeFloat 3s ease-in-out infinite}@keyframes badgeFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.current-badge-info{text-align:left}

.stat-card-value{color:#d4af37;font-size:1.4rem;font-weight:900}
.stat-card-label{color:rgba(255,255,255,0.4);font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;margin-top:0.2rem}

/* BADGES GRID */

.badges-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0.6rem;margin-bottom:2rem}
.badge-item{background:rgba(212,175,55,0.04);border:1px solid rgba(212,175,55,0.1);border-radius:12px;padding:0.8rem 0.3rem;display:flex;flex-direction:column;align-items:center;text-align:center;gap:0.3rem;transition:all 0.3s;position:relative}
.badge-item.unlocked{border-color:rgba(212,175,55,0.4);background:rgba(212,175,55,0.08)}
.badge-item.locked{opacity:0.3;filter:grayscale(1)}
.badge-item.locked .badge-img{filter:brightness(0.3) grayscale(1)}
.badge-item.unlocked:hover{transform:translateY(-3px);box-shadow:0 5px 20px rgba(212,175,55,0.2);border-color:#d4af37}
.badge-img{width:40px;height:40px;object-fit:contain;border-radius:8px}
.badge-item.unlocked .badge-img{filter:drop-shadow(0 0 8px rgba(212,175,55,0.4))}
.badge-name{color:rgba(255,255,255,0.6);font-size:0.55rem;font-weight:600;line-height:1.1}
.badge-item.unlocked .badge-name{color:#d4af37}
.badge-lock{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1rem;opacity:0.5}

.empty-state{text-align:center;padding:2rem;color:rgba(255,255,255,0.3);font-size:0.85rem}

@media(max-width:600px){
.badges-grid{grid-template-columns:repeat(4,1fr)}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.current-badge-section{flex-direction:column;text-align:center}
.current-badge-info{text-align:center}
.back-btn span{display:none}
.back-btn{padding:0.45rem 0.6rem}
.save-alert-inner{flex-direction:column;text-align:center}
.save-alert-form{flex-direction:column;width:100%}
.save-alert-form input{width:100%}
.main.with-alert{padding-top:10rem}
}
@media(max-width:400px){
.badges-grid{grid-template-columns:repeat(3,1fr)}
}</style>
</head>

// ✅ CALCUL STATS IDENTIQUE — AUCUNE MODIFICATION
function getBadgeStats(){
var s={points:userPoints,views:0,likesGiven:0,comments:0,ratings:0,streak:0,videosPublished:0,hasRatedVideo:false,maxVideoViews:0,maxVideoLikes:0,tipsReceived:0,shares:0,emailSaved:false,allOtherBadges:false};
for(var i=0;i<localStorage.length;i++){
var k=localStorage.key(i);
if(k&&k.indexOf('liked_')===0&&localStorage.getItem(k)==='true')s.likesGiven++;
if(k&&k.indexOf('rated_')===0)s.ratings++;
if(k&&k.indexOf('viewed_')===0)s.views++;
}
s.shares=parseInt(localStorage.getItem('aurora_total_shares')||'0');
s.emailSaved=!!localStorage.getItem('aurora_saved_email');
try{var sd=JSON.parse(localStorage.getItem('aurora_streak_data')||'{}');s.streak=sd.current_streak||0;}catch(e){}
return s;
}

function getCurrentBadge(){
var s=getBadgeStats(),u=[],ae=true;
BADGES_DATA.forEach(function(b){if(b.id===20)return;if(b.check(s))u.push(b.id);else ae=false;});
if(ae&&u.length===19)u.push(20);
var h=BADGES_DATA[0];
for(var i=BADGES_DATA.length-1;i>=0;i--){if(u.indexOf(BADGES_DATA[i].id)!==-1){h=BADGES_DATA[i];break;}}
return{badge:h,unlocked:u};
}

// ✅ SAUVEGARDE EMAIL DEPUIS L'ALERTE
async function saveEmailFromAlert(){
var email=document.getElementById('saveEmailInput').value.trim();
var btn=document.getElementById('saveAlertBtn');
if(!email||!email.includes('@')){alert('Entrez un email valide');return;}
btn.disabled=true;btn.textContent='Sauvegarde...';
try{
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var ex=await sb.from('user_points').select('total_points,viewer_id').eq('email',email).single();
if(!ex.error&&ex.data){
if(ex.data.viewer_id!==viewerId){await sb.from('user_points').update({viewer_id:viewerId,updated_at:new Date().toISOString()}).eq('email',email);
}
userPoints=ex.data.total_points||0;
}else{
var vp=await sb.from('user_points').select('total_points').eq('viewer_id',viewerId).single();
var pts=(!vp.error&&vp.data)?vp.data.total_points:0;
await sb.from('user_points').insert([{viewer_id:viewerId,total_points:pts,email:email}]);
userPoints=pts;
}
localStorage.setItem('aurora_saved_email',email);
document.getElementById('saveAlertForm').style.display='none';
document.getElementById('saveAlertSuccess').style.display='flex';
setTimeout(function(){
document.getElementById('saveAlert').classList.add('hidden');
document.getElementById('mainContent').classList.remove('with-alert');
loadBadges();
},1500);
}catch(e){
alert('Erreur: '+e.message);
btn.disabled=false;btn.textContent='💾 Sauvegarder';
}
}

// ✅ CHECK SI ALERTE NÉCESSAIRE
function checkSaveAlert(){

if(saved){
document.getElementById('saveAlert').classList.add('hidden');
document.getElementById('mainContent').classList.remove('with-alert');
}else{
document.getElementById('saveAlert').classList.remove('hidden');
document.getElementById('mainContent').classList.add('with-alert');
}
}

// ✅ CHARGEMENT BADGES IDENTIQUE — AUCUNE MODIFICATION
async function loadBadges(){
var sb=null;
var userEmail='';
var streak=0;
var commentsCount=0;
var ratingsCount=0;
var likesCount=0;
var viewsCount=0;
var videosPublished=0;
var maxVideoViews=0;
var maxVideoLikes=0;

try{
sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);var se=localStorage.getItem('aurora_saved_email');
var pr=null;
if(se)pr=await sb.from('user_points').select('*').eq('email',se).single();
if(!pr||pr.error)pr=await sb.from('user_points').select('*').eq('viewer_id',viewerId).single();
if(!pr.error&&pr.data){
userPoints=pr.data.total_points||0;
userEmail=pr.data.email||'';
streak=pr.data.current_streak||0;
}
var cr=await sb.from('comments').select('id').eq('viewer_id',viewerId);
if(!cr.error&&cr.data)commentsCount=cr.data.length;
else if(userEmail){var cr2=await sb.from('comments').select('id').eq('author_email',userEmail);if(!cr2.error&&cr2.data)commentsCount=cr2.data.length;}
var rr=await sb.from('video_ratings').select('id').eq('viewer_id',viewerId);
if(!rr.error&&rr.data)ratingsCount=rr.data.length;
var lr=await sb.from('video_likes_history').select('id').eq('viewer_id',viewerId);
if(!lr.error&&lr.data)likesCount=lr.data.length;
var vr=await sb.from('video_views').select('id').eq('viewer_id',viewerId);
if(!vr.error&&vr.data)viewsCount=vr.data.length;
var mv=await sb.from('videos').select('id,views,likes').eq('viewer_id',viewerId);
if(!mv.error&&mv.data){
videosPublished=mv.data.length;
mv.data.forEach(function(v){if((v.views||0)>maxVideoViews)maxVideoViews=v.views||0;if((v.likes||0)>maxVideoLikes)maxVideoLikes=v.likes||0;});
}
}catch(e){console.log('[Badges]',e);}

var shares=0;
for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('shares_today_')===0)shares+=parseInt(localStorage.getItem(k)||'0');}
var emailSaved=!!localStorage.getItem('aurora_saved_email');

var stats={
points:userPoints,views:viewsCount,likesGiven:likesCount,
comments:commentsCount,ratings:ratingsCount,streak:streak,
videosPublished:videosPublished,hasRatedVideo:ratingsCount>0,
maxVideoViews:maxVideoViews,maxVideoLikes:maxVideoLikes,
tipsReceived:0,shares:shares,emailSaved:emailSaved,allOtherBadges:false
};

var unlocked=[];
var allExcept=true;
BADGES_DATA.forEach(function(b){if(b.id===20)return;if(b.check(stats))unlocked.push(b.id);else allExcept=false;});
if(allExcept&&unlocked.length===19)unlocked.push(20);

var currentBadge=BADGES_DATA[0];
for(var j=BADGES_DATA.length-1;j>=0;j--){
if(unlocked.indexOf(BADGES_DATA[j].id)!==-1){currentBadge=BADGES_DATA[j];break;}
}

renderBadges({
points:userPoints,email:userEmail,streak:streak,
currentBadge:currentBadge,unlocked:unlocked,stats:stats});
}

// ✅ RENDU IDENTIQUE — AUCUNE MODIFICATION
function renderBadges(data){
var container=document.getElementById('mainContent');
var pct=Math.round((data.unlocked.length/20)*100);

var html='';

// BADGE ACTUEL
html+='<div class="current-badge-section">';
html+='<img class="current-badge-img" src="'+data.currentBadge.img+'" alt="'+esc(data.currentBadge.name)+'">';
html+='<div class="current-badge-info">';
html+='<div class="current-badge-label">Badge Actuel</div>';
html+='<div class="current-badge-name">'+esc(data.currentBadge.name)+'</div>';
html+='<div class="current-badge-points">'+fmt(data.points)+' points • '+data.streak+'j streak</div>';
html+='</div></div>';

// PROGRESS
html+='<div class="progress-wrap">';
html+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';
html+='<div class="progress-text"><span>'+pct+'% complété</span><span>'+data.unlocked.length+'/20 badges</span></div>';
html+='</div>';

// STATS
html+='<div class="stats-grid">';
html+='<div class="stat-card"><div class="stat-card-value">'+fmt(data.points)+'</div><div class="stat-card-label">Points</div></div>';
html+='<div class="stat-card"><div class="stat-card-value">'+data.unlocked.length+'/20</div><div class="stat-card-label">Badges</div></div>';
html+='<div class="stat-card"><div class="stat-card-value">'+data.streak+'j</div><div class="stat-card-label">Streak</div></div>';
html+='<div class="stat-card"><div class="stat-card-value">'+data.stats.views+'</div><div class="stat-card-label">Vues</div></div>';
html+='<div class="stat-card"><div class="stat-card-value">'+data.stats.likesGiven+'</div><div class="stat-card-label">Likes</div></div>';
html+='<div class="stat-card"><div class="stat-card-value">'+data.stats.comments+'</div><div class="stat-card-label">Commentaires</div></div>';
html+='</div>';

// ALL BADGES
html+='<div class="section-title">🏆 Collection Complète</div>';
html+='<div class="badges-grid">';
BADGES_DATA.forEach(function(b){
var isU=data.unlocked.indexOf(b.id)!==-1;
html+='<div class="badge-item '+(isU?'unlocked':'locked')+'">';
if(!isU)html+='<div class="badge-lock">🔒</div>';
html+='<img class="badge-img" src="'+b.img+'" alt="'+esc(b.name)+'" loading="lazy">';
html+='<div class="badge-name">'+esc(b.name)+'</div>';
html+='</div>';
});
html+='</div>';

container.innerHTML=html;
}
// INIT
checkSaveAlert();
loadBadges();
</script>
</body>
</html>
