<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page introuvable | AuroraAI</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23000'/%3E%3Cpolygon points='12,8 24,16 12,24' fill='%23d4af37' stroke='%23d4af37' stroke-width='1.5' stroke-linejoin='round'%3E%3Canimate attributeName='opacity' values='1;0.6;1' dur='2.5s' repeatCount='indefinite'/%3E%3C/polygon%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='36' fill='%23000'/%3E%3Cpolygon points='68,45 135,90 68,135' fill='%23d4af37' stroke='%23d4af37' stroke-width='6' stroke-linejoin='round'/%3E%3C/svg%3E">
<meta name="theme-color" content="#000000">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:sans-serif;min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
#plexusCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.container{position:relative;z-index:10;text-align:center;padding:2rem;max-width:500px}
.error-code{font-size:clamp(6rem,20vw,10rem);font-weight:900;color:rgba(212,175,55,0.08);line-height:1;letter-spacing:-5px;user-select:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);white-space:nowrap}
.content{position:relative;z-index:2}
.icon{font-size:3rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{color:#d4af37;font-size:1.8rem;font-weight:800;margin-bottom:0.8rem;letter-spacing:1px}
p{color:rgba(255,255,255,0.6);font-size:1rem;line-height:1.6;margin-bottom:2rem}
.back-btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.8rem 2rem;background:linear-gradient(135deg,#d4af37,#b8941f);border:none;border-radius:50px;color:#000;font-size:1rem;font-weight:700;text-decoration:none;transition:all 0.3s;box-shadow:0 4px 20px rgba(212,175,55,0.3)}
.back-btn:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(212,175,55,0.5)}
.back-btn svg{width:18px;height:18px;fill:#000}
.footer-link{margin-top:2rem;display:block;color:rgba(255,255,255,0.2);font-size:0.75rem;text-decoration:none;transition:color 0.3s}
.footer-link:hover{color:rgba(212,175,55,0.5)}
@media(max-width:768px){
.error-code{font-size:8rem}
h1{font-size:1.4rem}
p{font-size:0.9rem}
.back-btn{padding:0.7rem 1.5rem;font-size:0.9rem}
}
</style>
</head>
<body>
<canvas id="plexusCanvas"></canvas>
<div class="container">
<div class="error-code">404</div>
<div class="content">
<div class="icon">🎬</div>
<h1>Scène introuvable</h1>
<p>Cette page n'existe pas ou a été déplacée.<br>Retournez à l'accueil pour découvrir nos films IA.</p>
<a href="/" class="back-btn">
<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
Retour à l'accueil
</a>
<a href="/" class="footer-link">AuroraAI.watch — Cinéma & Séries IA</a>
</div>
</div>
<script>
(function(){var c=document.getElementById('plexusCanvas'),ctx=c.getContext('2d');function resize(){c.width=innerWidth;c.height=innerHeight;}var p=[];function init(){p=[];for(var i=0;i<40;i++)p.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*2+1});}function draw(){ctx.fillStyle='#000';ctx.fillRect(0,0,c.width,c.height);for(var i=0;i<p.length;i++){p[i].x+=p[i].vx;p[i].y+=p[i].vy;if(p[i].x<0||p[i].x>c.width)p[i].vx*=-1;if(p[i].y<0||p[i].y>c.height)p[i].vy*=-1;ctx.beginPath();ctx.arc(p[i].x,p[i].y,p[i].r,0,Math.PI*2);ctx.fillStyle='rgba(212,175,55,0.5)';ctx.fill();for(var j=i+1;j<p.length;j++){var dx=p[i].x-p[j].x,dy=p[i].y-p[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<200){ctx.beginPath();ctx.moveTo(p[i].x,p[i].y);ctx.lineTo(p[j].x,p[j].y);ctx.strokeStyle='rgba(212,175,55,'+(1-d/200)*0.2+')';ctx.lineWidth=1.7;ctx.stroke();}}}requestAnimationFrame(draw);}resize();init();draw();addEventListener('resize',function(){resize();init();});})();
</script>
</body>
</html>
