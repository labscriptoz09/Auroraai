var userPoints=0;
function getBadgeStatsPlayer(){var s={points:userPoints,views:0,likesGiven:0,comments:0,ratings:0,streak:0,videosPublished:0,hasRatedVideo:false,maxVideoViews:0,maxVideoLikes:0,tipsReceived:0,shares:0,emailSaved:false,allOtherBadges:false};for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('liked_')===0&&localStorage.getItem(k)==='true')s.likesGiven++;if(k&&k.indexOf('rated_')===0)s.ratings++;if(k&&k.indexOf('viewed_')===0)s.views++;}s.shares=parseInt(localStorage.getItem('aurora_total_shares')||'0');s.emailSaved=!!localStorage.getItem('aurora_saved_email');try{var sd=JSON.parse(localStorage.getItem('aurora_streak_data')||'{}');s.streak=sd.current_streak||0;}catch(e){}return s;}
function getCurrentBadgePlayer(){var s=getBadgeStatsPlayer(),u=[],ae=true;BADGES_DATA.forEach(function(b){if(b.id===20)return;if(b.check(s))u.push(b.id);else ae=false;});if(ae&&u.length===19)u.push(20);var h=BADGES_DATA[0];for(var i=BADGES_DATA.length-1;i>=0;i--){if(u.indexOf(BADGES_DATA[i].id)!==-1){h=BADGES_DATA[i];break;}}return{badge:h,unlocked:u};}
function updatePlayerBadge(sn){var r=getCurrentBadgePlayer(),b=r.badge;var ie=document.getElementById('playerBadgeImg'),ne=document.getElementById('playerBadgeName'),de=document.getElementById('playerBadgeDisplay');if(ie)ie.src=b.img;if(ne)ne.textContent=b.name;if(sn){var p=JSON.parse(localStorage.getItem('aurora_badges_unlocked')||'[]'),nw=r.unlocked.filter(function(id){return p.indexOf(id)===-1;});if(nw.length>0){if(de){de.classList.remove('badge-pulse');void de.offsetWidth;de.classList.add('badge-pulse');}nw.forEach(function(id,i){var bd=BADGES_DATA.find(function(x){return x.id===id;});if(bd)setTimeout(function(){showBadgeNotifPlayer(bd);},600*(i+1));});}}localStorage.setItem('aurora_badges_unlocked',JSON.stringify(r.unlocked));}
function showBadgeNotifPlayer(badge){var t=document.getElementById('badgeToastPlayer');if(!t||!badge.img)return;document.getElementById('badgeToastImg').src=badge.img;document.getElementById('badgeToastName').textContent=badge.name;document.getElementById('badgeToastDesc').textContent='';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3500);}
window.addEventListener('storage',function(e){if(e.key==='aurora_badges_unlocked')updatePlayerBadge(false);});

var sb=null,videoId=null;
var viewerId=(function(){var v=localStorage.getItem('aurora_viewer_id');if(!v){v='viewer_'+Date.now()+'_'+Math.random().toString(36).substr(2,9);localStorage.setItem('aurora_viewer_id',v);}return v;})();
function getParam(n){return new URLSearchParams(window.location.search).get(n);}
function fmt(n){n=parseInt(n);if(isNaN(n))return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'k';return''+n;}
function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function showToast(m,t){var e=document.getElementById('toast');e.textContent=m;e.className='toast show '+(t||'');setTimeout(function(){e.classList.remove('show');},3000);}
function closePlayer(){try{window.parent.postMessage({type:'closePlayer'},'*');}catch(e){}window.location.href='/';}
function triggerPointReveal(a,r,t){window.dispatchEvent(new CustomEvent('aurora:points',{detail:{amount:a,reason:r,total:t}}));}

async function addPointsPlayer(pts,reason,cvid){if(!sb)return;try{var se=localStorage.getItem('aurora_saved_email'),ex=null;if(se){ex=await sb.from('user_points').select('total_points,viewer_id').eq('email',se).single();if(!ex.error&&ex.data&&ex.data.viewer_id!==viewerId)await sb.from('user_points').update({viewer_id:viewerId,updated_at:new Date().toISOString()}).eq('email',se);}if(!ex||ex.error)ex=await sb.from('user_points').select('total_points').eq('viewer_id',viewerId).single();var nt=pts;if(!ex.error&&ex.data)nt=ex.data.total_points+pts;else{await sb.from('user_points').insert([{viewer_id:viewerId,total_points:pts,email:se||null}]);document.getElementById('playerPoints').textContent=fmt(pts);userPoints=pts;triggerPointReveal(pts,reason,pts);updatePlayerBadge(true);return;}await sb.from('user_points').update({total_points:nt,updated_at:new Date().toISOString()}).eq('viewer_id',viewerId);document.getElementById('playerPoints').textContent=fmt(nt);userPoints=nt;triggerPointReveal(pts,reason,nt);updatePlayerBadge(true);if(cvid&&cvid!==viewerId){var ce=await sb.from('user_points').select('total_points').eq('viewer_id',cvid).single();if(!ce.error&&ce.data)await sb.from('user_points').update({total_points:ce.data.total_points+pts,updated_at:new Date().toISOString()}).eq('viewer_id',cvid);else await sb.from('user_points').insert([{viewer_id:cvid,total_points:pts}]);}}catch(e){console.log('Points:',e);}}
async function loadPlayerPoints(){if(!sb)return;try{var se=localStorage.getItem('aurora_saved_email'),r=null;if(se)r=await sb.from('user_points').select('total_points').eq('email',se).single();if(!r||r.error)r=await sb.from('user_points').select('total_points').eq('viewer_id',viewerId).single();if(!r.error&&r.data){document.getElementById('playerPoints').textContent=fmt(r.data.total_points);userPoints=r.data.total_points;updatePlayerBadge(false);}}catch(e){}}
function buildCreatorLinks(ls){if(!ls||!ls.trim())return'';var links=ls.split(',').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});if(!links.length)return'';var h='<div class="creator-links-section">';links.forEach(function(link){var url=link;if(!url.startsWith('http'))url='https://'+url;var label=link.replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0];h+='<a href="'+esc(url)+'" target="_blank" rel="noopener noreferrer" class="creator-link">🔗 '+esc(label)+'</a>';});h+='</div>';return h;}

async function init(){
videoId=getParam('id');if(!videoId){document.getElementById('loadingMsg').textContent='Aucune vidéo sélectionnée';return;}
try{sb=window.supabase.createClient('https://knecqgspkalwepdwwpud.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuZWNxZ3Nwa2Fsd2VwZHd3cHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODUyNjUsImV4cCI6MjA5Njk2MTI2NX0.giDQFM5k2wQBlXAD10XKF8BRcg_jmABkjvQQ8ai7pww');loadPlayerPoints();var r=await sb.from('video_stats').select('*').eq('id',videoId).single();if(r.error||!r.data){document.getElementById('loadingMsg').textContent='Vidéo introuvable';return;}renderVideo(r.data);recordView(r.data);loadComments(videoId);}catch(e){document.getElementById('loadingMsg').textContent='Erreur: '+e.message;}}

function renderVideo(v){
var lk='liked_'+v.id,isL=localStorage.getItem(lk)==='true',rk='rated_'+v.id,uR=parseInt(localStorage.getItem(rk)||'0');
var cd=v.created_at?new Date(v.created_at).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'}):'';
var cl=buildCreatorLinks(v.creator_links);
document.getElementById('mainContent').innerHTML=
'<div class="player-wrapper"><video id="vid" controls playsinline autoplay><source src="'+v.video_url+'"></video><div class="end-screen-overlay" id="endScreenOverlay"><div class="end-logo-reveal" id="endLogoReveal"><div class="end-logo-icon"><div class="end-play-icon"></div></div><div class="end-logo-text">AuroraAI</div><div class="end-logo-tagline">Cinéma & Séries IA</div><button class="end-skip-btn" onclick="skipEndScreen()">Passer ▶</button></div></div></div>'+
'<div class="video-details"><h2>'+esc(v.title)+'</h2><div class="video-meta"><span>🎬 '+esc(v.author)+'</span><span>🎭 '+esc(v.category)+'</span>'+(cd?'<span>📅 '+cd+'</span>':'')+'<span id="vViews">👁️ '+fmt(v.views)+' vues</span><span id="vLikes">❤️ '+fmt(v.likes)+' likes</span></div>'+cl+
'<div class="rating-section"><span class="rating-label">Noter ce film :</span><div class="stars-container"><button class="star-btn'+(uR>=1?' active':'')+'" onclick="rateVideo(1)">★</button><button class="star-btn'+(uR>=2?' active':'')+'" onclick="rateVideo(2)">★</button><button class="star-btn'+(uR>=3?' active':'')+'" onclick="rateVideo(3)">★</button><button class="star-btn'+(uR>=4?' active':'')+'" onclick="rateVideo(4)">★</button><button class="star-btn'+(uR>=5?' active':'')+'" onclick="rateVideo(5)">★</button></div><span class="rating-display" id="ratingDisplay">'+(uR>0?uR+'/5':'Non noté')+'</span></div>'+
'<p class="video-desc">'+(v.description?esc(v.description):'Aucune description.')+'</p>'+
'<div class="video-actions"><button class="action-btn'+(isL?' liked':'')+'" id="likeBtn" onclick="toggleLike()"><span>❤️</span> <span id="likeText">'+(isL?'Aimé':'J\'aime')+'</span></button><button class="action-btn" onclick="shareVideo()">📤 Partager</button><button class="action-btn" onclick="downloadVideo()">📥 Télécharger</button></div>'+
'<div class="tip-section"><h3>💰 Soutenir l\'auteur</h3><input type="email" id="tipEmail" placeholder="Votre email"><button onclick="sendTip()">Envoyer un tip</button></div>'+
'<div class="comments-section"><h3>💬 Commentaires (<span id="cmtCount">0</span>)</h3><div class="comment-form"><input type="text" id="cmtName" placeholder="Votre nom *" maxlength="50"><input type="email" id="cmtEmail" placeholder="Email (optionnel)"><textarea id="cmtText" placeholder="Écrivez un commentaire..." maxlength="500"></textarea><button onclick="postComment()">Publier</button></div><div class="comments-list" id="cmtList"><p class="no-comments">Chargement...</p></div></div></div>';
window._currentVideo=v;setupEndScreen();}

async function rateVideo(stars){var v=window._currentVideo;if(!v)return;var rk='rated_'+v.id,cr=parseInt(localStorage.getItem(rk)||'0');if(cr>0){showToast('⚠️ Déjà noté','');return;}document.querySelectorAll('.star-btn').forEach(function(b,i){b.classList.toggle('active',i<stars);});document.getElementById('ratingDisplay').textContent=stars+'/5';localStorage.setItem(rk,stars.toString());if(sb){try{await sb.from('video_ratings').insert([{video_id:v.id,viewer_id:viewerId,rating:stars}]);var ar=await sb.from('video_ratings').select('rating').eq('video_id',v.id);if(!ar.error&&ar.data&&ar.data.length>0){var sum=0;ar.data.forEach(function(r){sum+=r.rating;});await sb.from('videos').update({rating:Math.round(sum/ar.data.length*10)/10}).eq('id',v.id);}addPointsPlayer(5,'Film noté',v.viewer_id);}catch(e){showToast('⭐ Note sauvegardée','');}}}

async function recordView(v){if(!sb)return;try{var r=await sb.from('video_views').insert([{video_id:v.id,viewer_id:viewerId}]);if(r.error&&r.error.code==='23505')return;}catch(e){}}

async function toggleLike(){var v=window._currentVideo;if(!v||!sb)return;var k='liked_'+v.id,isL=localStorage.getItem(k)==='true';try{if(isL){await sb.from('video_likes').delete().eq('video_id',v.id).eq('viewer_id',viewerId);v.likes=Math.max((v.likes||0)-1,0);}else{var r=await sb.from('video_likes').insert([{video_id:v.id,viewer_id:viewerId}]);if(r.error&&r.error.code!=='23505')throw r.error;v.likes=(v.likes||0)+1;var h=await sb.from('video_likes_history').select('id').eq('video_id',v.id).eq('viewer_id',viewerId).single();if(h.error||!h.data){await sb.from('video_likes_history').insert([{video_id:v.id,viewer_id:viewerId}]);addPointsPlayer(3,'Vidéo aimée',v.viewer_id);}}await sb.from('videos').update({likes:v.likes}).eq('id',v.id);localStorage.setItem(k,isL?'false':'true');document.getElementById('likeBtn').classList.toggle('liked',!isL);document.getElementById('likeText').textContent=isL?'J\'aime':'Aimé';document.getElementById('vLikes').textContent='❤️ '+fmt(v.likes)+' likes';showToast(isL?'Like retiré':'❤️ Vidéo aimée',isL?'':'success');updatePlayerBadge(true);}catch(e){showToast('❌ Erreur like','error');}}

async function shareVideo(){var v=window._currentVideo;if(!v)return;if(navigator.share){try{await navigator.share({title:v.title,text:'Regardez '+v.title+' sur AuroraAI !',url:location.href});showToast('📤 Partagée','success');}catch(e){}}else{navigator.clipboard.writeText(location.href);showToast('📋 Lien copié','success');}}
function downloadVideo(){var v=window._currentVideo;if(!v)return;var a=document.createElement('a');a.href=v.video_url;a.download=v.title+'.mp4';a.click();showToast('📥 Téléchargement...','');}
async function sendTip(){var ue=document.getElementById('tipEmail').value.trim();if(!ue){showToast('❌ Email requis','error');return;}var v=window._currentVideo;if(!v||!sb)return;try{var r=await sb.from('videos').select('tip_email').eq('id',v.id).single();if(r.error||!r.data||!r.data.tip_email){showToast('❌ Email créateur indisponible','error');return;}addPointsPlayer(50,'Tip envoyé',null);showToast('💰 Tip envoyé à '+esc(v.author)+' (+50 ⭐)','success');document.getElementById('tipEmail').value='';}catch(e){showToast('❌ '+e.message,'error');}}

async function loadComments(vid){
var list=document.getElementById('cmtList');if(!list)return;
if(!sb){try{sb=window.supabase.createClient('https://knecqgspkalwepdwwpud.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuZWNxZ3Nwa2Fsd2VwZHd3cHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODUyNjUsImV4cCI6MjA5Njk2MTI2NX0.giDQFM5k2wQBlXAD10XKF8BRcg_jmABkjvQQ8ai7pww');}catch(e){list.innerHTML='<p class="no-comments">Connexion requise</p>';return;}}

}).join('');
}else{document.getElementById('cmtCount').textContent='0';list.innerHTML='<p class="no-comments">Aucun commentaire. Soyez le premier !</p>';}}
catch(e){list.innerHTML='<p class="no-comments">Erreur chargement</p>';}}

async function postComment(){
var name=(document.getElementById('cmtName').value||'').trim(),email=(document.getElementById('cmtEmail').value||'').trim(),text=(document.getElementById('cmtText').value||'').trim();
if(!name){showToast('❌ Nom requis','error');return;}if(!text||text.length<3){showToast('❌ Commentaire trop court','error');return;}
if(!sb){try{sb=window.supabase.createClient('https://knecqgspkalwepdwwpud.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuZWNxZ3Nwa2Fsd2VwZHd3cHVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODUyNjUsImV4cCI6MjA5Njk2MTI2NX0.giDQFM5k2wQBlXAD10XKF8BRcg_jmABkjvQQ8ai7pww');}catch(e){showToast('❌ Connexion requise','error');return;}}

var v=window._currentVideo;addPointsPlayer(5,'Commentaire publié',v?v.viewer_id:null);
document.getElementById('cmtName').value='';document.getElementById('cmtEmail').value='';document.getElementById('cmtText').value='';

var endScreenTimer=null;
function setupEndScreen(){var vid=document.getElementById('vid');if(!vid)return;vid.addEventListener('ended',showEndScreen);vid.addEventListener('play',hideEndScreen);vid.addEventListener('seeked',function(){if(!vid.ended)hideEndScreen();});}
function showEndScreen(){var o=document.getElementById('endScreenOverlay'),l=document.getElementById('endLogoReveal');if(!o||!l)return;o.classList.add('active');setTimeout(function(){l.classList.add('visible');},300);endScreenTimer=setTimeout(skipEndScreen,5000);}
function hideEndScreen(){if(endScreenTimer){clearTimeout(endScreenTimer);endScreenTimer=null;}var o=document.getElementById('endScreenOverlay'),l=document.getElementById('endLogoReveal');if(o)o.classList.remove('active');if(l)l.classList.remove('visible');}
function skipEndScreen(){if(endScreenTimer){clearTimeout(endScreenTimer);endScreenTimer=null;}hideEndScreen();}
window.skipEndScreen=skipEndScreen;
init();
