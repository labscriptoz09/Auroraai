function getBadgeStatsPlayer(){
var stats={points:0,views:0,likesGiven:0,comments:0,ratings:0,streak:0,videosPublished:0,hasRatedVideo:false,maxVideoViews:0,maxVideoLikes:0,tipsReceived:0,shares:0,emailSaved:false,allOtherBadges:false};
for(var i=0;i<localStorage.length;i++){
var k=localStorage.key(i);
if(k&&k.indexOf('liked_')===0&&localStorage.getItem(k)==='true')stats.likesGiven++;
if(k&&k.indexOf('rated_')===0)stats.ratings++;
if(k&&k.indexOf('viewed_')===0)stats.views++;
}
stats.shares=parseInt(localStorage.getItem('aurora_total_shares')||'0');
stats.emailSaved=!!localStorage.getItem('aurora_saved_email');
try{var sd=JSON.parse(localStorage.getItem('aurora_streak_data')||'{}');stats.streak=sd.current_streak||0;}catch(e){}
return stats;
}

function getCurrentBadgePlayer(){
var stats=getBadgeStatsPlayer();
var unlocked=[];
var allExcept=true;
BADGES_DATA.forEach(function(b){if(b.id===20)return;if(b.check(stats))unlocked.push(b.id);else allExcept=false;});
if(allExcept&&unlocked.length===19)unlocked.push(20);
var highest=BADGES_DATA[0];
for(var i=BADGES_DATA.length-1;i>=0;i--){
if(unlocked.indexOf(BADGES_DATA[i].id)!==-1){highest=BADGES_DATA[i];break;}
}
return{badge:highest,unlocked:unlocked};
}

function updatePlayerBadge(showNotif){
var result=getCurrentBadgePlayer();
var b=result.badge;
var imgEl=document.getElementById('playerBadgeImg');
var nameEl=document.getElementById('playerBadgeName');
var displayEl=document.getElementById('playerBadgeDisplay');
if(imgEl)imgEl.src=b.img;
if(nameEl)nameEl.textContent=b.name;
if(showNotif){
var prev=JSON.parse(localStorage.getItem('aurora_badges_unlocked')||'[]');
var newly=result.unlocked.filter(function(id){return prev.indexOf(id)===-1;});
if(newly.length>0){
if(displayEl){displayEl.classList.remove('badge-pulse');void displayEl.offsetWidth;displayEl.classList.add('badge-pulse');}
newly.forEach(function(id,i){
var bd=BADGES_DATA.find(function(x){return x.id===id;});
if(bd)setTimeout(function(){showBadgeNotifPlayer(bd);},600*(i+1));
});
}}
localStorage.setItem('aurora_badges_unlocked',JSON.stringify(result.unlocked));
}

async function addPointsPlayer(points,reason,creatorViewerId){

try{

var nt=points;
if(!existing.error&&existing.data)nt=existing.data.total_points+points;
else{await sb.from('user_points').insert([{viewer_id:viewerId,total_points:points,email:savedEmail||null}]);document.getElementById('playerPoints').textContent=fmt(points);userPoints=points;triggerPointReveal(points,reason,points);updatePlayerBadge(true);return;}
await sb.from('user_points').update({total_points:nt,updated_at:new Date().toISOString()}).eq('viewer_id',viewerId);
document.getElementById('playerPoints').textContent=fmt(nt);
userPoints=nt;

updatePlayerBadge(true);

}

function buildCreatorLinks(linksStr){
if(!linksStr||!linksStr.trim())return'';var links=linksStr.split(',').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
if(!links.length)return'';
var html='<div class="creator-links-section">';
links.forEach(function(link){
var url=link;
if(!url.startsWith('http'))url='https://'+url;
var label=link.replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0];
html+='<a href="'+esc(url)+'" target="_blank" rel="noopener noreferrer" class="creator-link">🔗 '+esc(label)+'</a>';
});
html+='</div>';
return html;
}

async function rateVideo(stars){

}

// ===== END SCREEN LOGO SYSTEM (IDENTIQUE) =====
var endScreenTimer=null;
function setupEndScreen(){
    var vid=document.getElementById('vid');
    if(!vid)return;
    vid.addEventListener('ended',function(){
        showEndScreen();
    });
    vid.addEventListener('play',function(){
        hideEndScreen();
    });
    vid.addEventListener('seeked',function(){
        if(!vid.ended)hideEndScreen();
    });
}
function showEndScreen(){
    var overlay=document.getElementById('endScreenOverlay');
    var logo=document.getElementById('endLogoReveal');
    if(!overlay||!logo)return;
    overlay.classList.add('active');
    setTimeout(function(){
        logo.classList.add('visible');
    },300);
    endScreenTimer=setTimeout(function(){
        skipEndScreen();
    },5000);
}
function hideEndScreen(){
    if(endScreenTimer){clearTimeout(endScreenTimer);endScreenTimer=null;}
    var overlay=document.getElementById('endScreenOverlay');    var logo=document.getElementById('endLogoReveal');
    if(overlay)overlay.classList.remove('active');
    if(logo)logo.classList.remove('visible');
}
function skipEndScreen(){
    if(endScreenTimer){clearTimeout(endScreenTimer);endScreenTimer=null;}
    hideEndScreen();
}
window.skipEndScreen=skipEndScreen;
